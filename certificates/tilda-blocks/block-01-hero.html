<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1" defer></script>

<style>
  :root {
    --mbs-green-dark: #417033;
    --mbs-green:      #4F883E;
    --mbs-green-light:#B6D8AB;
    --mbs-bg-green:   #E7F2E3;
    --mbs-red:        #CC2841;
    --mbs-red-soft:   #D83D54;
    --mbs-bg:         #F5F5F5;
    --mbs-black:      #1F1F1F;
    --mbs-gray:       #555555;
    --mbs-white:      #FFFFFF;
  }
  html { scroll-behavior: smooth; }

  .mbs-cert-hero {
    background: var(--mbs-white);
    padding: 80px 20px 72px;
    font-family: 'Mulish', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mbs-cert-hero * { box-sizing: border-box; margin: 0; padding: 0; }
  .mbs-cert-hero__inner { max-width: 1100px; margin: 0 auto; }
  .mbs-cert-hero__label {
    display: inline-flex; align-items: center; gap: 6px;
    margin-bottom: 20px; padding: 7px 16px; border-radius: 999px;
    background: rgba(231,242,227,.95); color: var(--mbs-green-dark);
    font-size: 13px; font-weight: 900; line-height: 1;
  }
  .mbs-cert-hero__h1 {
    font-size: 68px; font-weight: 900; line-height: 0.95;
    letter-spacing: -0.05em; color: var(--mbs-black); margin-bottom: 24px;
  }
  .mbs-cert-hero__lead {
    font-size: 20px; font-weight: 500; line-height: 1.5;
    color: var(--mbs-gray); margin-bottom: 36px; max-width: 520px;
  }
  .mbs-cert-hero__btns { display: flex; gap: 12px; flex-wrap: wrap; }
  .mbs-cert-hero__btn-buy {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 56px; padding: 0 32px; border-radius: 999px;
    background: var(--mbs-red); color: #fff !important; text-decoration: none !important;
    font-family: 'Mulish', sans-serif; font-size: 16px; font-weight: 900;
    transition: background .2s, transform .15s;
  }
  .mbs-cert-hero__btn-buy:hover { background: var(--mbs-red-soft); transform: translateY(-1px); }
  .mbs-cert-hero__btn-consult {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 56px; padding: 0 30px; border-radius: 999px;
    background: transparent; border: 2.5px solid var(--mbs-green-dark);
    color: var(--mbs-green-dark) !important; text-decoration: none !important;
    font-family: 'Mulish', sans-serif; font-size: 16px; font-weight: 800;
    transition: background .2s;
  }
  .mbs-cert-hero__btn-consult:hover { background: var(--mbs-bg-green); }

  .mbs-cert-hero__content {
    display: grid; grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto auto; column-gap: 48px; align-items: start;
  }
  .mbs-cert-hero__label  { grid-column: 1; grid-row: 1; justify-self: start; }
  .mbs-cert-hero__h1     { grid-column: 1; grid-row: 2; }
  .mbs-cert-hero__lead   { grid-column: 1; grid-row: 3; }
  .mbs-cert-hero__btns   { grid-column: 1; grid-row: 4; }
  .mbs-cert-hero__visual {
    grid-column: 2; grid-row: 1 / 5;
    display: flex; align-items: center; justify-content: center;
  }
  .mbs-cert-hero__cards { position: relative; width: 100%; height: 320px; }
  .mbs-cert-hero__cert-img { position: absolute; width: 92%; transition: transform .3s; }
  .mbs-cert-hero__cert-img--back {
    top: 0; left: 0; transform: rotate(-5deg) translateY(4px); z-index: 1;
  }
  .mbs-cert-hero__cert-img--front {
    top: 20px; right: 0; transform: rotate(4deg); z-index: 2;
  }
  .mbs-cert-hero__visual:hover .mbs-cert-hero__cert-img--back {
    transform: rotate(-8deg) translateY(8px) translateX(-4px);
  }
  .mbs-cert-hero__visual:hover .mbs-cert-hero__cert-img--front {
    transform: rotate(6deg) translateY(-4px);
  }

  @media (max-width: 820px) {
    .mbs-cert-hero__content { grid-template-columns: 1fr; }
    .mbs-cert-hero__label  { grid-column: 1; grid-row: auto; }
    .mbs-cert-hero__h1     { grid-column: 1; grid-row: auto; }
    .mbs-cert-hero__lead   { grid-column: 1; grid-row: auto; }
    .mbs-cert-hero__visual { grid-column: 1; grid-row: auto; height: 300px; }
    .mbs-cert-hero__btns   { grid-column: 1; grid-row: auto; position: relative; z-index: 10; }
    .mbs-cert-hero__cards  { height: 300px; }
    .mbs-cert-hero__h1 { font-size: 38px; }
    .mbs-cert-hero__lead { font-size: 16px; }
    .mbs-cert-hero { padding: 48px 16px 40px; }
  }
  @media (max-width: 540px) {
    .mbs-cert-hero__btns { flex-direction: column; }
    .mbs-cert-hero__btn-buy, .mbs-cert-hero__btn-consult { width: 100%; }
  }
</style>

<section class="mbs-cert-hero">
  <div class="mbs-cert-hero__inner">
    <div class="mbs-cert-hero__content">
      <div class="mbs-cert-hero__label">
        <i class="ph ph-gift"></i>
        Подарочные сертификаты
      </div>
      <h1 class="mbs-cert-hero__h1">Сертификаты для тех,<br>кто любит кофе</h1>
      <p class="mbs-cert-hero__lead">
        Сертификаты на обучение в Московской школе бариста.
        Для профессионалов, владельцев кофеен и просто любителей кофе.
      </p>
      <div class="mbs-cert-hero__visual">
        <div class="mbs-cert-hero__cards">
          <img class="mbs-cert-hero__cert-img mbs-cert-hero__cert-img--back"
               src="https://static.tildacdn.com/tild3065-6535-4563-b563-653736363435/1_copy-min.png"
               alt="Подарочный сертификат MBS зелёный">
          <img class="mbs-cert-hero__cert-img mbs-cert-hero__cert-img--front"
               src="https://static.tildacdn.com/tild3361-3830-4334-a262-653461636537/2_copy-min.png"
               alt="Подарочный сертификат MBS красный">
        </div>
      </div>
      <div class="mbs-cert-hero__btns">
        <a href="#certificates" class="mbs-cert-hero__btn-buy">
          <i class="ph ph-gift" style="margin-right:8px"></i>
          Выбрать сертификат
        </a>
        <a href="#consalt" class="mbs-cert-hero__btn-consult">Помочь с выбором</a>
      </div>
    </div>
  </div>
</section>
