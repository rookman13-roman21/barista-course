<!--
  MBS /capping — Tilda block 05 of 05
  Назначение: служебный JS страницы — meta/canonical, FAQ-аккордеон, плавный скролл и попап связи.
  Куда вставлять: последним HTML-блоком после блока 04.
  Важно: без этого блока FAQ, плавный скролл и SEO-meta будут без интерактива.
-->
  <style id="mbs-capping-font-guard">
    @import url('https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&display=swap');

    html body .mbs-capping-page,
    html body .mbs-capping-page *,
    html body .mbs-capping-page *::before,
    html body .mbs-capping-page *::after,
    html body .mbs-capping,
    html body .mbs-capping *,
    html body .mbs-capping *::before,
    html body .mbs-capping *::after {
      font-family: 'Mulish', Arial, sans-serif !important;
    }

    html body .mbs-capping-page h1,
    html body .mbs-capping-page h2,
    html body .mbs-capping-page h3,
    html body .mbs-capping-page h4,
    html body .mbs-capping-page p,
    html body .mbs-capping-page span,
    html body .mbs-capping-page a,
    html body .mbs-capping-page button,
    html body .mbs-capping-page strong,
    html body .mbs-capping h1,
    html body .mbs-capping h2,
    html body .mbs-capping h3,
    html body .mbs-capping h4,
    html body .mbs-capping p,
    html body .mbs-capping span,
    html body .mbs-capping a,
    html body .mbs-capping button,
    html body .mbs-capping strong {
      font-family: 'Mulish', Arial, sans-serif !important;
    }
  </style>
  <script>
    (function () {
      var pageRoots = Array.prototype.slice.call(document.querySelectorAll('.mbs-capping-page'));
      if (!pageRoots.length) return;
      var MBS_FONT_FAMILY = "'Mulish', Arial, sans-serif";

      function ensureMbsFontLoaded() {
        if (document.getElementById('mbs-capping-mulish-font')) return;
        var link = document.createElement('link');
        link.id = 'mbs-capping-mulish-font';
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&display=swap';
        document.head.appendChild(link);
      }

      function injectFontGuardStyle() {
        if (document.getElementById('mbs-capping-runtime-font-guard')) return;
        var style = document.createElement('style');
        style.id = 'mbs-capping-runtime-font-guard';
        style.textContent = "html body .mbs-capping-page,html body .mbs-capping-page *,html body .mbs-capping,html body .mbs-capping *{font-family:'Mulish',Arial,sans-serif!important;}";
        document.head.appendChild(style);
      }

      function applyMbsFontGuard() {
        ensureMbsFontLoaded();
        injectFontGuardStyle();
        Array.prototype.slice.call(document.querySelectorAll(
          '.mbs-capping-page, .mbs-capping-page *, .mbs-capping, .mbs-capping *'
        )).forEach(function (node) {
          if (node && node.style && node.nodeType === 1) {
            var current = node.style.getPropertyValue('font-family');
            var priority = node.style.getPropertyPriority('font-family');
            if (current !== MBS_FONT_FAMILY || priority !== 'important') {
              node.style.setProperty('font-family', MBS_FONT_FAMILY, 'important');
            }
          }
        });
      }

      applyMbsFontGuard();
      setTimeout(applyMbsFontGuard, 300);
      setTimeout(applyMbsFontGuard, 1000);
      setTimeout(applyMbsFontGuard, 2500);
      if (window.MutationObserver) {
        var fontGuardTimer = null;
        var fontObserver = new MutationObserver(function () {
          clearTimeout(fontGuardTimer);
          fontGuardTimer = setTimeout(applyMbsFontGuard, 30);
        });
        pageRoots.forEach(function (root) {
          fontObserver.observe(root, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['style', 'class']
          });
        });
        var widgetNode = document.getElementById('mbs-capping-widget');
        if (widgetNode) {
          fontObserver.observe(widgetNode, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['style', 'class']
          });
        }
      }

      function queryAll(selector) {
        return pageRoots.reduce(function (nodes, root) {
          return nodes.concat(Array.prototype.slice.call(root.querySelectorAll(selector)));
        }, []);
      }

      function setMeta(name, content, attr) {
        var selector = attr === 'property' ? 'meta[property="' + name + '"]' : 'meta[name="' + name + '"]';
        var tag = document.querySelector(selector);
        if (!tag) {
          tag = document.createElement('meta');
          tag.setAttribute(attr || 'name', name);
          document.head.appendChild(tag);
        }
        tag.setAttribute('content', content);
      }

      function setCanonical(url) {
        var link = document.querySelector('link[rel="canonical"]');
        if (!link) {
          link = document.createElement('link');
          link.setAttribute('rel', 'canonical');
          document.head.appendChild(link);
        }
        link.setAttribute('href', url);
      }

      try {
        document.title = 'Каппинг кофе в Москве | Московская школа бариста';
        setMeta('description', 'Каппинг в Московской школе бариста: профессиональная дегустация кофе, разбор вкуса, аромата, зерна и онлайн-запись на ближайшие даты.');
        setMeta('og:title', 'Каппинг кофе в Москве', 'property');
        setMeta('og:description', 'Пробуем кофе, сравниваем вкус и аромат, разбираем зерно и выбираем ближайшую дату каппинга.', 'property');
        setMeta('og:type', 'website', 'property');
        setMeta('og:url', 'https://baristaschool.ru/capping', 'property');
        setMeta('og:image', 'https://static.tildacdn.com/tild3137-3334-4637-b163-343531303334/DSC04248_copy.jpg', 'property');
        setMeta('og:site_name', 'Московская школа бариста', 'property');
        setMeta('og:locale', 'ru_RU', 'property');
        setMeta('twitter:card', 'summary_large_image');
        setMeta('twitter:title', 'Каппинг кофе в Москве');
        setMeta('twitter:description', 'Пробуем кофе, сравниваем вкус и аромат, разбираем зерно и выбираем ближайшую дату каппинга.');
        setMeta('twitter:image', 'https://static.tildacdn.com/tild3137-3334-4637-b163-343531303334/DSC04248_copy.jpg');
        setCanonical('https://baristaschool.ru/capping');
      } catch (error) {}

      var faqItems = queryAll('.mbs-capping-page__faq-item');
      faqItems.forEach(function (item) {
        var btn = item.querySelector('.mbs-capping-page__faq-question');
        var body = item.querySelector('.mbs-capping-page__faq-body');
        if (!btn || !body) return;
        btn.addEventListener('click', function () {
          var isOpen = item.classList.contains('is-open');
          faqItems.forEach(function (other) {
            var otherBody = other.querySelector('.mbs-capping-page__faq-body');
            var otherBtn = other.querySelector('.mbs-capping-page__faq-question');
            other.classList.remove('is-open');
            if (otherBody) otherBody.style.maxHeight = '0px';
            if (otherBtn) otherBtn.setAttribute('aria-expanded', 'false');
          });
          if (!isOpen) {
            item.classList.add('is-open');
            body.style.maxHeight = body.scrollHeight + 'px';
            btn.setAttribute('aria-expanded', 'true');
          }
        });
      });

      queryAll('a[href^="#"]').forEach(function (link) {
        link.addEventListener('click', function (event) {
          var href = link.getAttribute('href');
          if (!href || href === '#') return;
          var target = document.getElementById(href.slice(1));
          if (!target) return;
          event.preventDefault();
          var reduceMotion = window.matchMedia &&
            window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          target.scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block: 'start' });
        });
      });

      function initCappingGallery() {
        var root = document.getElementById('mbs-capping-gallery-root');
        if (!root || root.getAttribute('data-mbs-gallery-init')) return;
        root.setAttribute('data-mbs-gallery-init', '1');

        var activeAlbumIndex = 0;
        var activePhotoIndex = 0;
        var activeModalTab = 'photos';
        var deepLinkedAlbumId = '';
        var deepLinkOpened = false;
        var galleryItemsAll = [];
        var galleryItems = [];
        var galleryMeta = { albumsCount: 0, companiesCount: 0 };
        var gallerySearchQuery = '';
        var modal = null;
        var albumCache = {};
        var albumPreloadQueue = {};
        var preloadedImages = {};
        var cuppingResultsById = {};
        var indexUrls = [
          root.getAttribute('data-gallery-index-url'),
          root.getAttribute('data-fallback-gallery-index-url')
        ].filter(Boolean);
        var legacyUrls = [
          root.getAttribute('data-gallery-url'),
          root.getAttribute('data-fallback-gallery-url')
        ].filter(Boolean);
        var albumTemplates = [
          root.getAttribute('data-gallery-album-url-template'),
          root.getAttribute('data-fallback-gallery-album-url-template')
        ].filter(Boolean);
        var resultsUrls = [
          root.getAttribute('data-cupping-results-url'),
          root.getAttribute('data-fallback-cupping-results-url')
        ].filter(Boolean);

        var defaultCover = 'https://static.tildacdn.com/tild6565-3661-4436-b664-623133326635/DSC02931_copy.jpg';

        function esc(value) {
          return String(value == null ? '' : value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function safeUrl(value, fallback) {
          try {
            var url = new URL(String(value || ''), window.location.href);
            if (url.protocol !== 'https:') return fallback || '';
            return url.href;
          } catch (error) {
            return fallback || '';
          }
        }

        function safeImageUrl(value, fallback) {
          var href = safeUrl(value, fallback);
          if (!href) return fallback || '';
          try {
            var url = new URL(href);
            var host = url.hostname;
            var allowed = host === 'lh3.googleusercontent.com' ||
              host === 'static.tildacdn.com' ||
              host === 'drive.google.com' ||
              host === 'api.barista-school.ru';
            return allowed ? url.href : fallback || '';
          } catch (error) {
            return fallback || '';
          }
        }

        function safeFileId(value) {
          return String(value || '').trim().replace(/[^a-zA-Z0-9_-]+/g, '-').replace(/^-+|-+$/g, '') || '';
        }

        function fetchJson(url) {
          return fetch(url, { cache: 'no-store' }).then(function (response) {
            if (!response.ok) throw new Error('gallery status ' + response.status);
            return response.json();
          });
        }

        function fetchJsonFromUrls(fetchUrls, fallback) {
          function tryOne(index) {
            var url = fetchUrls[index];
            if (!url) return fallback ? fallback() : Promise.reject(new Error('gallery urls empty'));
            return fetchJson(url).catch(function () {
              return tryOne(index + 1);
            });
          }
          return tryOne(0);
        }

        function imageUrl(rawUrl, size) {
          if (!rawUrl) return '';
          var url = String(rawUrl).trim();
          if (url.indexOf('lh3.googleusercontent.com') !== -1) {
            url = url.split('?')[0].replace(/=(?:s|w)\d+.*$/, '');
            return url + '=w' + size;
          }
          if (url.indexOf('drive.google.com') !== -1) {
            var fileMatch = url.match(/\/file\/d\/([^/]+)/);
            var idMatch = url.match(/[?&]id=([^&]+)/);
            var id = fileMatch && fileMatch[1] ? fileMatch[1] : idMatch && idMatch[1];
            if (id) return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(id) + '&sz=w' + size;
          }
          return url;
        }

        function getTitle(item) {
          return item.company || item.title || item.name || item.topic || 'Каппинг кофе';
        }

        function normalizeSearchText(value) {
          return String(value || '').toLowerCase().replace(/ё/g, 'е').trim();
        }

        function pluralRu(number, one, few, many) {
          var n = Math.abs(Number(number) || 0);
          var mod10 = n % 10;
          var mod100 = n % 100;
          if (mod10 === 1 && mod100 !== 11) return one;
          if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
          return many;
        }

        function getCover(item) {
          var firstPhoto = item && item.photos && item.photos[0];
          var fromPhotos = typeof firstPhoto === 'string' ? firstPhoto : firstPhoto && firstPhoto.url;
          return safeImageUrl(imageUrl(fromPhotos || item.cover_url || item.cover || item.image_url || item.logo_url || '', 480), defaultCover);
        }

        function getPhotos(item) {
          var raw = item && Array.isArray(item.photos) ? item.photos : [];
          var photos = raw.map(function (photo) {
            return safeImageUrl(imageUrl(typeof photo === 'string' ? photo : photo && photo.url, 1400));
          }).filter(Boolean);
          var cover = getCover(item);
          if (!photos.length && cover) photos.push(cover);
          return photos;
        }

        function getPhotosCount(item) {
          if (!item) return 0;
          if (typeof item.photos_count === 'number') return item.photos_count;
          return Array.isArray(item.photos) ? item.photos.length : 0;
        }

        function hasRealPhotos(item) {
          return getPhotosCount(item) > 0 || (item && Array.isArray(item.photos) && item.photos.length > 0);
        }

        function getCuppingResult(item) {
          var id = getAlbumId(item);
          return id && cuppingResultsById[id] ? cuppingResultsById[id] : null;
        }

        function formatScore(value) {
          var number = Number(value);
          if (!Number.isFinite(number)) return '—';
          return String(Math.round(number * 100) / 100).replace('.', ',');
        }

        function scorePercent(value) {
          var number = Number(value);
          if (!Number.isFinite(number)) return 0;
          return Math.max(0, Math.min(100, (number / 5) * 100));
        }

        function normalizeCuppingResults(data) {
          var items = data && Array.isArray(data.items) ? data.items : [];
          var map = {};
          items.forEach(function (item) {
            var id = safeFileId(item && item.id);
            var lots = item && Array.isArray(item.lots) ? item.lots.filter(function (lot) {
              return lot && lot.average != null;
            }) : [];
            if (!id || !lots.length) return;
            map[id] = item;
          });
          return map;
        }

        function loadCuppingResults() {
          if (!resultsUrls.length) return Promise.resolve({});
          return fetchJsonFromUrls(resultsUrls)
            .then(normalizeCuppingResults)
            .catch(function () {
              return {};
            });
        }

        function normalizeItems(data) {
          var items = data && Array.isArray(data.items) ? data.items : data;
          if (!Array.isArray(items) || !items.length) return [];
          var filtered = items.filter(function (item) {
            return item && getTitle(item) && getCover(item);
          });
          filtered.sort(function (a, b) {
            var da = String(a && a.date || '');
            var db = String(b && b.date || '');
            return da < db ? 1 : da > db ? -1 : 0;
          });
          return filtered;
        }

        function getCompaniesCount(data, items) {
          if (data && Array.isArray(data.companies) && data.companies.length) {
            return data.companies.filter(Boolean).length;
          }
          var seen = {};
          items.forEach(function (item) {
            var company = normalizeSearchText(item && item.company);
            if (company) seen[company] = true;
          });
          return Object.keys(seen).length;
        }

        function getGalleryStats(data, items) {
          return {
            albumsCount: items.length,
            companiesCount: getCompaniesCount(data, items)
          };
        }

        function matchesGallerySearch(item, query) {
          if (!query) return true;
          var haystack = [
            item && item.company,
            item && item.title,
            item && item.name,
            item && item.topic
          ].join(' ');
          return normalizeSearchText(haystack).indexOf(query) !== -1;
        }

        function filterGalleryItems(query) {
          var normalizedQuery = normalizeSearchText(query);
          return galleryItemsAll.filter(function (item) {
            return matchesGallerySearch(item, normalizedQuery);
          });
        }

        function getAlbumId(item) {
          return safeFileId(item && item.id);
        }

        function getAlbumUrls(item) {
          var id = getAlbumId(item);
          var urls = [];
          if (!id) return urls;
          if (item && item.album_url) {
            var albumPath = String(item.album_url || '').trim();
            if (/^gallery-albums\/[a-zA-Z0-9_-]+\.json$/.test(albumPath)) {
              urls.push(safeUrl(new URL(albumPath, root.getAttribute('data-gallery-index-url') || window.location.href).href));
            }
          }
          albumTemplates.forEach(function (template) {
            urls.push(safeUrl(String(template).replace('{id}', encodeURIComponent(id))));
          });
          return urls.filter(Boolean);
        }

        function mergeAlbumItem(indexItem, albumData) {
          var item = albumData && albumData.item ? albumData.item : albumData;
          if (!item || typeof item !== 'object') return indexItem;
          var merged = {};
          Object.keys(indexItem || {}).forEach(function (key) { merged[key] = indexItem[key]; });
          Object.keys(item).forEach(function (key) { merged[key] = item[key]; });
          merged._albumLoaded = true;
          return merged;
        }

        function loadAlbum(item) {
          var id = getAlbumId(item);
          if (!id || item._albumLoaded || Array.isArray(item.photos)) {
            item._albumLoaded = true;
            return Promise.resolve(item);
          }
          if (albumCache[id]) return Promise.resolve(albumCache[id]);
          if (albumPreloadQueue[id]) return albumPreloadQueue[id];

          var urls = getAlbumUrls(item);
          if (!urls.length) return Promise.resolve(item);

          albumPreloadQueue[id] = fetchJsonFromUrls(urls).then(function (albumData) {
            var merged = mergeAlbumItem(item, albumData);
            albumCache[id] = merged;
            return merged;
          }).catch(function () {
            return item;
          }).finally(function () {
            delete albumPreloadQueue[id];
          });
          return albumPreloadQueue[id];
        }

        function preloadImage(url) {
          url = safeImageUrl(url);
          if (!url || preloadedImages[url]) return;
          preloadedImages[url] = true;
          var img = new Image();
          img.decoding = 'async';
          img.src = url;
        }

        function preloadCovers(items, start, count) {
          items.slice(start, start + count).forEach(function (item) {
            preloadImage(getCover(item));
          });
        }

        function preloadAlbumPhotos(item, count) {
          loadAlbum(item).then(function (loaded) {
            getPhotos(loaded).slice(0, count).forEach(preloadImage);
          });
        }

        function getGallerySectionUrl() {
          var base = window.location.origin + window.location.pathname;
          return base.replace(/\/$/, '') + '#mbs-capping-gallery-title';
        }

        function getAlbumShareUrl(item) {
          var id = getAlbumId(item);
          var url = new URL(window.location.href);
          url.hash = '';
          if (id) url.searchParams.set('album', id);
          return url.href;
        }

        function getRequestedAlbumId() {
          try {
            return safeFileId(new URL(window.location.href).searchParams.get('album'));
          } catch (error) {
            return '';
          }
        }

        function copyTextToClipboard(text) {
          if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text);
          }
          return new Promise(function (resolve, reject) {
            var input = document.createElement('textarea');
            input.value = text;
            input.setAttribute('readonly', '');
            input.style.position = 'fixed';
            input.style.top = '-9999px';
            input.style.left = '-9999px';
            document.body.appendChild(input);
            input.select();
            try {
              document.execCommand('copy') ? resolve() : reject(new Error('copy_failed'));
            } catch (error) {
              reject(error);
            } finally {
              document.body.removeChild(input);
            }
          });
        }

        function renderGalleryToolbar() {
          var albumsLabel = pluralRu(galleryMeta.albumsCount, 'каппинг', 'каппинга', 'каппингов');
          var companiesLabel = pluralRu(galleryMeta.companiesCount, 'компания', 'компании', 'компаний');
          return '<div class="mbs-capping-page__gallery-toolbar">' +
            '<div class="mbs-capping-page__gallery-stats" aria-label="Статистика фотоальбомов">' +
              '<span class="mbs-capping-page__gallery-stat">' + galleryMeta.albumsCount + ' ' + albumsLabel + '</span>' +
              '<span class="mbs-capping-page__gallery-stat">' + galleryMeta.companiesCount + ' ' + companiesLabel + '</span>' +
            '</div>' +
            '<div class="mbs-capping-page__gallery-actions">' +
              '<label class="mbs-capping-page__gallery-search">' +
                '<span class="sr-only">Найти компанию</span>' +
                '<input type="search" data-mbs-capping-gallery-search placeholder="Найти компанию" value="' + esc(gallerySearchQuery) + '" autocomplete="off">' +
                '<svg class="mbs-capping-page__gallery-search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m20 20-4.4-4.4M18 11a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>' +
              '</label>' +
              '<button class="mbs-capping-page__gallery-copy" type="button" data-mbs-capping-gallery-copy data-copy-label="Скопировано" aria-label="Скопировать ссылку на фотоальбомы">' +
                '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9.5 14.5 14.5 9.5M11 6.5l1.2-1.2a4 4 0 0 1 5.7 5.7l-1.2 1.2M13 17.5l-1.2 1.2a4 4 0 0 1-5.7-5.7l1.2-1.2" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
              '</button>' +
            '</div>' +
          '</div>';
        }

        function initGallerySearch() {
          var input = root.querySelector('[data-mbs-capping-gallery-search]');
          if (input) {
            input.addEventListener('input', function () {
              gallerySearchQuery = input.value || '';
              renderGalleryList(filterGalleryItems(gallerySearchQuery));
            });
          }

          var copyButton = root.querySelector('[data-mbs-capping-gallery-copy]');
          if (!copyButton) return;
          copyButton.addEventListener('click', function () {
            copyTextToClipboard(getGallerySectionUrl()).then(function () {
              copyButton.classList.add('is-copied');
              window.setTimeout(function () {
                copyButton.classList.remove('is-copied');
              }, 1400);
            });
          });
        }

        function showSkeleton() {
          root.innerHTML =
            '<div class="mbs-capping-page__gallery-skeleton" aria-hidden="true">' +
              '<div class="mbs-capping-page__gallery-skeleton-card"></div>' +
              '<div class="mbs-capping-page__gallery-skeleton-card"></div>' +
              '<div class="mbs-capping-page__gallery-skeleton-card"></div>' +
            '</div>';
        }

        function renderGalleryList(items) {
          galleryItems = items;
          var listRoot = root.querySelector('[data-mbs-capping-gallery-list-root]');
          if (!listRoot) return;
          if (!items.length) {
            listRoot.innerHTML = '<div class="mbs-capping-page__gallery-empty">' +
              (gallerySearchQuery ? 'Компании не найдены.' : 'Фотоальбомы временно не загрузились.') +
            '</div>';
            return;
          }

          var arrowLeft = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

        function initGalleryScroll(scope) {
          var scroll = scope.querySelector('.mbs-capping-page__gallery-scroll');

          var prev = scope.querySelector('.mbs-capping-page__gallery-control--prev');
          var next = scope.querySelector('.mbs-capping-page__gallery-control--next');
          if (!scroll || !list || !prev || !next) return;

          function getStep() {
            var card = list.querySelector('.mbs-capping-page__gallery-card');
            if (!card) return Math.max(260, Math.round(list.clientWidth * 0.8));
            var styles = window.getComputedStyle(list);
            var gap = parseFloat(styles.columnGap || styles.gap || '0') || 0;
            return Math.round(card.getBoundingClientRect().width + gap);
          }

          function updateState() {
            var max = Math.max(0, list.scrollWidth - list.clientWidth - 2);
            var atStart = list.scrollLeft <= 2;
            var atEnd = list.scrollLeft >= max;
            prev.disabled = atStart;
            next.disabled = atEnd || max <= 0;
          }

          prev.addEventListener('click', function () {
            list.scrollBy({ left: -getStep(), behavior: 'smooth' });
          });
          next.addEventListener('click', function () {
            list.scrollBy({ left: getStep(), behavior: 'smooth' });
          });
          list.addEventListener('scroll', updateState, { passive: true });
          window.addEventListener('resize', updateState);
          setTimeout(updateState, 0);

            overlay.style.left = '0';
            overlay.style.right = '0';
            overlay.style.top = visibleTop + 'px';
            overlay.style.width = '100%';

            if (modal) modal.style.maxHeight = Math.max(parentHeight - 28, 260) + 'px';

        )).filter(function (node) {

            window.parent.document.body.style.overflow = 'hidden';
            parentScrollLocked = true;

        } catch (error) {}
      }

      function unlockScroll() {
        document.documentElement.style.overflow = '';

            window.parent.document.body.style.overflow = '';

        updateOverlayViewport();
        if (lastFocus && lastFocus.focus) lastFocus.focus();
      }

      openers.forEach(function (btn) {
        btn.addEventListener('click', openContact);
      });
      if (closeBtn) closeBtn.addEventListener('click', closeContact);
      if (overlay) {
        overlay.addEventListener('click', function (event) {
          if (event.target === overlay) closeContact();
        });
      }
      document.addEventListener('keydown', function (event) {
        if (!overlay || !overlay.classList.contains('is-open')) return;
        if (event.key === 'Escape') {
          closeContact();
          return;
        }
        if (event.key !== 'Tab') return;
        var focusable = getFocusableNodes();
        if (!focusable.length) return;
        var first = focusable[0];
        var last = focusable[focusable.length - 1];
        if (event.shiftKey && document.activeElement === first) {
          event.preventDefault();
          last.focus();
        } else if (!event.shiftKey && document.activeElement === last) {
          event.preventDefault();
          first.focus();
        }
      });
    })();
  </script>
