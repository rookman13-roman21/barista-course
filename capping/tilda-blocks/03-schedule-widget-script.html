<!--
  MBS /capping — Tilda block 03 of 05
  Назначение: JS виджета расписания — API, fallback, кэш, карточки событий, popup записи и Event JSON-LD.
  Куда вставлять: сразу после блока 02.
  Важно: использует #mbs-capping-widget из блока 01 и проверяет booking_url только на https + домены yClients.
-->
<script>
(function () {
var root = document.getElementById('mbs-capping-widget');
if (!root) return;
var apiUrl = root.getAttribute('data-api-url');
var fallbackApiUrl = root.getAttribute('data-fallback-api-url') || '';
if (!apiUrl) {
root.innerHTML = '<div class="mbs-cap-empty">Не указан API URL.</div>';
return;
}
var apiUrls = [apiUrl];
if (fallbackApiUrl && fallbackApiUrl !== apiUrl) apiUrls.push(fallbackApiUrl);
function fetchWithTimeout(url, options, ms) {
return new Promise(function (resolve, reject) {
var done = false;
var timer = setTimeout(function () {
if (done) return;
done = true;
reject(new Error('timeout'));
}, ms || 4500);
fetch(url, options || {}).then(function (resp) {
if (done) return;
done = true;
clearTimeout(timer);
resolve(resp);
}, function (err) {
if (done) return;
done = true;
clearTimeout(timer);
reject(err);
});
});
}
function cacheBustedUrl(value) {
var url = new URL(value, window.location.href);
url.searchParams.set('_', String(Date.now()));
return url.toString();
}
function fetchJsonFromUrls(urls, options) {
function tryOne(index) {
return fetchWithTimeout(cacheBustedUrl(urls[index]), options || { method: 'GET' }, 4500)
.then(function (r) {
if (!r.ok) throw new Error('HTTP ' + r.status);
return r.json();
})
.catch(function (err) {
if (index + 1 < urls.length) return tryOne(index + 1);
throw err;
});
}
return tryOne(0);
}
function esc(t) {
return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function getSafeYclientsUrl(value) {
if (!value) return '';
try {
var url = new URL(String(value).trim());
var host = url.hostname.toLowerCase();
var isYclientsHost = host === 'yclients.com' || host.slice(-13) === '.yclients.com';
return url.protocol === 'https:' && isYclientsHost ? url.toString() : '';
} catch (error) {
return '';
}
}
/* ——— Короткое название месяца ——— */
var MONTH_SHORT = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
function monthShort(dateStr) {
if (!dateStr) return '';
var parts = dateStr.split('-');
var m = parseInt(parts[1], 10);
return MONTH_SHORT[m - 1] || '';
}

var closeSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

/* ——— Render gallery (image slider) ——— */
function renderGallery(images, alt) {
if (!images || !images.length) return '<div class="mbs-cap-img-placeholder">☕</div>';
if (images.length === 1) return '<img src="' + esc(images[0]) + '" alt="' + esc(alt) + '" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;">';
var h = '<div class="mbs-cap-gallery">';
h += '<div class="mbs-cap-gallery-track">';

/* ——— Init gallery touch/drag ——— */
function initGalleries(container) {
var gals = container.querySelectorAll('.mbs-cap-gallery');
for (var g = 0; g < gals.length; g++) {
(function(gal) {
var track = gal.querySelector('.mbs-cap-gallery-track');
var slides = gal.querySelectorAll('.mbs-cap-gallery-slide');
var dots = gal.querySelectorAll('.mbs-cap-gallery-dot');
var arrows = gal.querySelectorAll('.mbs-cap-gallery-arrow');
if (!track || slides.length < 2) return;
var cur = 0, startX = 0, dx = 0, dragging = false;
function go(idx) {
cur = Math.max(0, Math.min(idx, slides.length - 1));
track.style.transform = 'translateX(-' + (cur * 100) + '%)';
for (var i = 0; i < dots.length; i++) dots[i].classList.toggle('active', i === cur);
}
for (var a = 0; a < arrows.length; a++) {
arrows[a].addEventListener('click', function(e) {
e.stopPropagation();
go(cur + (this.classList.contains('prev') ? -1 : 1));
});
}
for (var d = 0; d < dots.length; d++) {
dots[d].addEventListener('click', function(e) {
e.stopPropagation();
go(parseInt(this.dataset.idx, 10));
});
}
/* Touch swipe */
gal.addEventListener('touchstart', function(e) {
startX = e.touches[0].clientX; dx = 0; dragging = true;
track.classList.add('dragging');
}, { passive: true });
gal.addEventListener('touchmove', function(e) {
if (!dragging) return;
dx = e.touches[0].clientX - startX;
track.style.transform = 'translateX(calc(-' + (cur * 100) + '% + ' + dx + 'px))';
}, { passive: true });
gal.addEventListener('touchend', function() {
if (!dragging) return;
dragging = false;
track.classList.remove('dragging');
if (Math.abs(dx) > 40) go(cur + (dx < 0 ? 1 : -1)); else go(cur);
dx = 0;
});
/* Mouse drag */
gal.addEventListener('mousedown', function(e) {
e.preventDefault();
startX = e.clientX; dx = 0; dragging = true;
track.classList.add('dragging');
});
document.addEventListener('mousemove', function(e) {
if (!dragging) return;
dx = e.clientX - startX;
track.style.transform = 'translateX(calc(-' + (cur * 100) + '% + ' + dx + 'px))';
});
document.addEventListener('mouseup', function() {
if (!dragging) return;
dragging = false;
track.classList.remove('dragging');
if (Math.abs(dx) > 40) go(cur + (dx < 0 ? 1 : -1)); else go(cur);
dx = 0;
});
})(gals[g]);
}
}
/* ——— Synthesize month key from date string ——— */
var MONTH_FULL_NOM = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
function getMonthKey(dateStr) {
if (!dateStr) return 'unknown';
var p = dateStr.split('-');
return p[0] + '-' + p[1]; /* e.g. "2025-07" */
}
function getMonthLabel(dateStr) {
if (!dateStr) return '';
var p = dateStr.split('-');
var m = parseInt(p[1], 10);
return MONTH_FULL_NOM[m - 1] || '';
}
/* ——— Форматирование длительности ——— */
function formatDuration(minutes) {
if (!minutes) return '';
if (minutes < 60) return minutes + ' мин';
var h = minutes / 60;
if (h === Math.floor(h)) return h + ' ч';
return h.toFixed(1).replace('.', ',').replace(/,0$/, '') + ' ч';
}
/* ——— Форматирование цены ——— */
function formatPrice(price) {
if (!price) return '';
return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' ₽';
}
/* ——— Склонение: 1 день, 2 дня, 5 дней ——— */
function pluralize(n, one, few, many) {
var abs = Math.abs(n) % 100;
var n1 = abs % 10;
if (abs > 10 && abs < 20) return many;
if (n1 > 1 && n1 < 5) return few;
if (n1 === 1) return one;
return many;
}
/* ——— Счётчик дней до события ——— */
function formatCountdown(dateStr) {
if (!dateStr) return '';
var parts = dateStr.split('-');
var evDate = new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
var now = new Date();
var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
var diff = Math.round((evDate - today) / 86400000);
if (diff < 0) return '';
if (diff === 0) return '<span class="mbs-cap-countdown today">Сегодня</span>';
if (diff === 1) return '<span class="mbs-cap-countdown soon">Завтра</span>';
if (diff <= 3) return '<span class="mbs-cap-countdown soon">Через ' + diff + ' ' + pluralize(diff, 'день', 'дня', 'дней') + '</span>';
if (diff <= 7) return '<span class="mbs-cap-countdown">Через ' + diff + ' ' + pluralize(diff, 'день', 'дня', 'дней') + '</span>';
return '';
}

'<p class="mbs-cap-fallback-note">Информация на странице остаётся доступной: ниже можно посмотреть формат каппинга, FAQ и контакты школы.</p>' +
'</div>';
var retryBtn = document.getElementById('mbs-cap-retry-btn');
if (retryBtn) retryBtn.addEventListener('click', loadCuppings);
}
function loadCuppings() {
var cached = loadFromCache(CACHE_STALE_TTL);
if (cached) {
/* stale-while-revalidate: render cached immediately, fetch in background */
render(cached.cuppings || []);
afterRender(cached.cuppings || []);
fetchJsonFromUrls(apiUrls, { method: 'GET' })
.then(function (fresh) {
var oldJson = JSON.stringify(cached);
var newJson = JSON.stringify(fresh);
saveToCache(fresh);
if (oldJson !== newJson) { render(fresh.cuppings || []); afterRender(fresh.cuppings || []); }
})
.catch(function () { /* silently keep stale data */ });
} else {
showSkeleton();
fetchJsonFromUrls(apiUrls, { method: 'GET' })
.then(function (data) { saveToCache(data); render(data.cuppings || []); afterRender(data.cuppings || []); })
.catch(function (err) {
console.error('Capping widget error:', err);
showScheduleFallback('error');
});
}
}
loadCuppings();
/* Auto-refresh every 5 minutes (silent background update) */
setInterval(function () {
if (!document.hidden) loadCuppings();
}, 5 * 60 * 1000);
})();
</script>
