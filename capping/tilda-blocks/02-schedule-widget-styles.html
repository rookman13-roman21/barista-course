<!--
  MBS /capping — Tilda block 02 of 05
  Назначение: CSS виджета онлайн-записи и карточек расписания.
  Куда вставлять: сразу после блока 01.
  Важно: это только стили виджета; данные и интерактивность находятся в блоке 03.
-->
<style>
  /* ══════════════════════════════════════════
     MBS Capping Schedule Widget
     Визуальный стиль идентичен events-block
     ══════════════════════════════════════════ */
  .mbs-capping {
    --bg: #f8f7f4;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #7a7a7a;
    --accent: #b5453a;
    --accent-light: #faeae8;
    --success: #2d8a56;
    --success-bg: #e8f5ee;
    --danger: #b5453a;
    --danger-bg: #faeae8;
    --border: #e8e6e1;
    --warm-bg: #faf9f7;
    --radius: 16px;

    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
    font-family: 'Mulish', Arial, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .mbs-capping,
  .mbs-capping *,
  .mbs-capping *::before,
  .mbs-capping *::after {
    font-family: 'Mulish', Arial, sans-serif !important;
  }

  /* ——— Grid (3 columns on desktop) ——— */
  .mbs-cap-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ——— Card (vertical, compact) ——— */
  .mbs-cap-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: box-shadow .25s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .mbs-cap-card:hover {
    box-shadow: 0 8px 32px rgba(0,0,0,0.07);
  }

  /* Image */
  .mbs-cap-img-wrap {
    position: relative;
    width: 100%;
    padding-top: 75%;      /* 4:3 aspect */
    flex-shrink: 0;
    background: var(--warm-bg);
    overflow: hidden;
  }
  .mbs-cap-img-wrap img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  /* Override position:absolute for carousel slides inside img-wrap */
  .mbs-cap-img-wrap .mbs-cap-gallery-slide img { position: static; }

  /* Seats badge */
  .mbs-cap-seats-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    z-index: 4;
    pointer-events: none;
  }
  .mbs-cap-seats-badge.available {
    background: var(--success-bg);
    color: var(--success);
  }
  .mbs-cap-seats-badge.low {
    background: var(--danger-bg);
    color: var(--danger);
    animation: mbs-cap-pulse 2s ease-in-out infinite;
  }
  .mbs-cap-seats-badge.soldout {
    background: var(--danger-bg);
    color: var(--danger);
  }
  @keyframes mbs-cap-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .65; }
  }

  /* Body */
  .mbs-cap-body {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  /* Desktop: hide heavy elements in compact card — details go to popup */
  .mbs-cap-card:not(.collapsed) .mbs-cap-roaster,
  .mbs-cap-card:not(.collapsed) .mbs-cap-roaster-pending,
  .mbs-cap-card:not(.collapsed) .mbs-cap-meta,
  .mbs-cap-card:not(.collapsed) .mbs-cap-trainer,
  .mbs-cap-card:not(.collapsed) .mbs-cap-action,
  .mbs-cap-card:not(.collapsed) .mbs-cap-seats { display: none; }

  /* Date row */
  .mbs-cap-date-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mbs-cap-day-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    flex-shrink: 0;
  }
  .mbs-cap-day-num {
    font-size: 18px;
    font-weight: 800;
    line-height: 1;
  }
  .mbs-cap-day-wd {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.85;
    margin-top: 2px;
  }
  .mbs-cap-time-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .mbs-cap-time {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .mbs-cap-weekday {
    font-size: 13px;
    color: var(--muted);
    text-transform: capitalize;
  }

  /* ——— Days until label ——— */
  .mbs-cap-countdown {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 1px;
  }
  .mbs-cap-countdown.soon {
    color: var(--danger);
  }
  .mbs-cap-countdown.today {
    color: var(--success);
  }

  /* Title */
  .mbs-cap-title {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Compact subtitle (roaster name, 1-2 lines) */
  .mbs-cap-compact-sub {
    display: block;
    font-size: 12px;
    line-height: 1.35;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Roaster info block */
  .mbs-cap-roaster {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin: -4px 0 0;
    padding: 10px 14px;
    background: transparent;
    border: 1px solid rgba(181,69,58,0.18);
    border-radius: 10px;
  }
  .mbs-cap-roaster-icon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
    color: var(--accent);
  }
  .mbs-cap-roaster-info {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .mbs-cap-roaster-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
  }
  .mbs-cap-roaster-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }
  .mbs-cap-roaster-desc {
    font-size: 13px;
    line-height: 1.45;
    color: var(--muted);
    max-height: 120px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    display: block;
  }

  /* Pending roaster (unknown yet) */
  .mbs-cap-roaster-pending {
    color: var(--accent);
    font-style: italic;
    font-weight: 400;
    font-size: 13px;
    line-height: 1.4;
    margin: 0;
  }

  /* Meta row (duration + price) */
  .mbs-cap-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 13px;
    color: var(--muted);
  }
  .mbs-cap-meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .mbs-cap-meta-icon {
    font-size: 14px;
    line-height: 1;
  }
  /* Trainer */
  .mbs-cap-trainer {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mbs-cap-trainer-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
  }
  .mbs-cap-trainer-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .mbs-cap-trainer-role {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .mbs-cap-trainer-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  /* Seats info */
  .mbs-cap-seats {
    font-size: 13px;
    color: var(--muted);
  }
  .mbs-cap-seats strong {
    color: var(--text);
    font-weight: 600;
  }

  /* Action */
  .mbs-cap-action {
    margin-top: auto;
    padding-top: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .mbs-cap-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none !important;
    padding: 10px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    border: 2px solid var(--danger);
    background: transparent;
    color: var(--danger) !important;
    cursor: pointer;
    transition: background .15s ease, color .15s ease, transform .15s ease, box-shadow .15s ease;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    flex-shrink: 0;
  }
  .mbs-cap-btn:visited {
    color: var(--danger) !important;
  }
  @media (hover: hover) and (pointer: fine) {
    .mbs-cap-btn:hover,
    .mbs-cap-btn:visited:hover {
      background: var(--danger);
      color: #fff !important;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(181,69,58,0.25);
    }
  }
  .mbs-cap-btn:active,
  .mbs-cap-btn.mbs-cap-btn-pressed {
    transform: scale(0.97);
    box-shadow: none;
  }

  .mbs-cap-btn.disabled {
    background: #e8e6e1;
    color: #999 !important;
    border-color: #e8e6e1;
    cursor: default;
    pointer-events: none;
  }

  /* Waiting list button */
  .mbs-cap-btn-waiting {
    border-color: var(--text);
    color: var(--text) !important;
    background: transparent;
  }
  .mbs-cap-btn-waiting:visited {
    color: var(--text) !important;
  }
  @media (hover: hover) and (pointer: fine) {
    .mbs-cap-btn-waiting:hover,
    .mbs-cap-btn-waiting:visited:hover {
      background: var(--text);
      color: #fff !important;
    }
  }
  .mbs-cap-btn-waiting.disabled {
    opacity: 0.5;
    cursor: default;
  }

  /* Sold out seats text */
  .mbs-cap-seats-soldout {
    color: var(--danger) !important;
    font-weight: 600;
  }

  /* ——— Sold-out section ——— */
  .mbs-cap-soldout-section {
    margin-top: 20px;
    max-width: 780px;
    margin-left: auto;
    margin-right: auto;
  }
  .mbs-cap-soldout-heading {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 12px 0;
  }
  .mbs-cap-soldout-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ——— Collapsed card (sold-out) ——— */
  .mbs-cap-card.collapsed {
    flex-direction: row;
    flex-wrap: wrap;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .mbs-cap-card.collapsed:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
  }
  .mbs-cap-card.collapsed .mbs-cap-img-wrap,
  .mbs-cap-card.collapsed .mbs-cap-body { display: none; }

  .mbs-cap-collapsed-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    width: 100%;
  }
  .mbs-cap-collapsed-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .mbs-cap-collapsed-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--warm-bg);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .mbs-cap-collapsed-day-num {
    font-size: 18px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }
  .mbs-cap-collapsed-day-wd {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-top: 1px;
  }
  .mbs-cap-collapsed-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .mbs-cap-collapsed-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mbs-cap-collapsed-time {
    font-size: 12px;
    color: var(--muted);
  }
  .mbs-cap-collapsed-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .mbs-cap-collapsed-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--danger);
    background: var(--danger-bg);
    border-radius: 999px;
    padding: 4px 10px;
    white-space: nowrap;
  }
  .mbs-cap-collapsed-chevron {
    width: 18px;
    height: 18px;
    color: var(--muted);
    transition: transform .25s ease;
    flex-shrink: 0;
  }
  .mbs-cap-card.collapsed.open .mbs-cap-collapsed-chevron {
    transform: rotate(180deg);
  }

  /* Collapsed body (expandable) — grid-based animation */
  .mbs-cap-collapsed-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows .4s cubic-bezier(.4,0,.2,1);
    width: 100%;
  }
  .mbs-cap-card.collapsed.open .mbs-cap-collapsed-body {
    grid-template-rows: 1fr;
  }
  .mbs-cap-collapsed-body > .mbs-cap-collapsed-body-inner {
    overflow: hidden;
  }
  .mbs-cap-collapsed-body-inner {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 14px;
    margin-top: 14px;
    border-top: 1px solid var(--border);
  }
  .mbs-cap-collapsed-img {
    width: 100%;
    height: 160px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .mbs-cap-collapsed-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Collapsed content wrapper */
  .mbs-cap-collapsed-content {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .mbs-cap-soldout-banner {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--danger);
    background: var(--danger-bg);
    border-radius: 10px;
    padding: 10px 14px;
  }
  /* ——— Global waiting list button ——— */
  .mbs-cap-waiting-global {
    margin-top: 24px;
    text-align: center;
    max-width: 780px;
    margin-left: auto;
    margin-right: auto;
  }
  .mbs-cap-btn-global {
    width: 100%;
    max-width: 400px;
    padding: 14px 28px;
    font-size: 15px;
    border-radius: 14px;
  }

  /* ——— Recommendation block ——— */
  .mbs-cap-recommend {
    margin-top: 32px;
    padding: 28px 24px;
    background: var(--warm-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-width: 780px;
    margin-left: auto;
    margin-right: auto;
  }
  .mbs-cap-recommend-cta {
    text-align: center;
    margin-bottom: 20px;
  }
  .mbs-cap-recommend-text {
    font-size: 15px;
    line-height: 1.55;
    color: var(--text);
    margin: 0 0 16px 0;
  }
  .mbs-cap-recommend-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none !important;
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    border: 2px solid var(--muted);
    background: transparent;
    color: var(--text) !important;
    cursor: pointer;
    transition: background .15s ease, color .15s ease, transform .15s ease, box-shadow .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  @media (hover: hover) and (pointer: fine) {
    .mbs-cap-recommend-btn:hover {
      background: var(--text);
      color: #fff !important;
      border-color: var(--text);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
  }
  .mbs-cap-recommend-btn:visited { color: var(--text) !important; }
  @media (hover: hover) and (pointer: fine) {
    .mbs-cap-recommend-btn:visited:hover { color: #fff !important; }
  }
  .mbs-cap-recommend-divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }
  .mbs-cap-recommend-heading {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 14px 0;
    text-align: center;
  }
  .mbs-cap-recommend-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .mbs-cap-recommend-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: box-shadow .2s ease;
  }
  .mbs-cap-recommend-item:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .mbs-cap-recommend-img {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--warm-bg);
  }
  .mbs-cap-recommend-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .mbs-cap-recommend-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mbs-cap-recommend-date {
    font-size: 12px;
    color: var(--muted);
  }
  .mbs-cap-recommend-link {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none !important;
    padding: 6px 14px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    transition: background .15s ease, color .15s ease;
    white-space: nowrap;
  }
  @media (hover: hover) and (pointer: fine) {
    .mbs-cap-recommend-link:hover {
      background: var(--accent);
      color: #fff !important;
    }
  }
  .mbs-cap-recommend-link:visited { color: var(--accent) !important; }
  @media (hover: hover) and (pointer: fine) {
    .mbs-cap-recommend-link:visited:hover { color: #fff !important; }
  }
  @media (max-width: 600px) {
    .mbs-cap-recommend { padding: 20px 16px; }
    .mbs-cap-recommend-text { font-size: 14px; }
    .mbs-cap-recommend-item { gap: 10px; padding: 10px 12px; }
    .mbs-cap-recommend-img { width: 48px; height: 48px; }
    .mbs-cap-recommend-title { font-size: 13px; }
    .mbs-cap-recommend-link { font-size: 12px; padding: 5px 10px; }
  }

  /* Desktop: horizontal layout for opened collapsed card */
  @media (min-width: 769px) {
    .mbs-cap-collapsed-body-inner {
      flex-direction: row;
      gap: 16px;
      align-items: stretch;
    }
    .mbs-cap-collapsed-img {
      width: 260px;
      height: auto;
      min-height: 180px;
      flex-shrink: 0;
      align-self: stretch;
    }
    .mbs-cap-collapsed-content {
      justify-content: center;
    }
  }

  /* ——— Skeleton loader ——— */
  @keyframes mbs-cap-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .mbs-cap-skeleton {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .mbs-cap-skeleton-card {
    display: flex;
    flex-direction: column;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--card);
  }
  .mbs-cap-skeleton-img {
    width: 100%;
    padding-top: 75%;
    flex-shrink: 0;
    background: linear-gradient(110deg, #eee 30%, #f5f5f5 50%, #eee 70%);
    background-size: 200% 100%;
    animation: mbs-cap-shimmer 1.5s ease-in-out infinite;
  }
  .mbs-cap-skeleton-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }
  .mbs-cap-skeleton-line {
    height: 14px;
    border-radius: 6px;
    background: linear-gradient(110deg, #eee 30%, #f5f5f5 50%, #eee 70%);
    background-size: 200% 100%;
    animation: mbs-cap-shimmer 1.5s ease-in-out infinite;
  }
  .mbs-cap-skeleton-line.w60 { width: 60%; }
  .mbs-cap-skeleton-line.w80 { width: 80%; }
  .mbs-cap-skeleton-line.w40 { width: 40%; }
  .mbs-cap-skeleton-line.h20 { height: 20px; }
  @media (max-width: 768px) {
