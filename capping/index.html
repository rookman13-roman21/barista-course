<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каппинг кофе — локальное превью</title>
  <meta name="description" content="Локальное превью страницы каппинга Московской школы бариста, собранное из Tilda HTML-блоков.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: #FFFFFF;
      color: #1F1F1F;
      font-family: 'Mulish', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .preview-bar {
      position: sticky;
      top: 0;
      z-index: 1000000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 42px;
      padding: 10px 16px;
      background: #1F1F1F;
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
    }
    .preview-bar a {
      color: #B6D8AB;
      font-weight: 900;
      text-decoration: none;
    }
    .preview-error {
      max-width: 820px;
      margin: 40px auto;
      padding: 24px;
      border-radius: 20px;
      background: #F8DDE1;
      color: #1F1F1F;
      font-size: 16px;
      line-height: 1.5;
    }
    @media (max-width: 820px) {
      .preview-bar {
        position: static;
        display: block;
      }
      .preview-bar a {
        display: block;
        margin-top: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="preview-bar">
    Превью страницы «Каппинг кофе» собрано из Tilda-блоков 00–05
    <a href="https://baristaschool.ru/capping" target="_blank" rel="noopener noreferrer">Текущая страница</a>
  </div>

  <main id="preview-root" aria-live="polite"></main>

  <script>
    (function () {
      var files = [
        './tilda-blocks/00-seo-and-page-styles.html',
        './tilda-blocks/01-top-content.html',
        './tilda-blocks/02-schedule-widget-styles.html',
        './tilda-blocks/03-schedule-widget-script.html',
        './tilda-blocks/04-bottom-content.html',
        './tilda-blocks/05-page-scripts.html'
      ];
      var root = document.getElementById('preview-root');

      function appendHtml(html) {
        var template = document.createElement('template');
        template.innerHTML = html;
        var nodes = Array.prototype.slice.call(template.content.childNodes);
        nodes.forEach(function (node) {
          if (node.nodeName.toLowerCase() !== 'script') {
            root.appendChild(node);
            return;
          }

          var script = document.createElement('script');
          for (var i = 0; i < node.attributes.length; i += 1) {
            var attr = node.attributes[i];
            script.setAttribute(attr.name, attr.value);
          }
          script.text = node.textContent;
          document.body.appendChild(script);
        });
      }

      function showError(error) {
        root.innerHTML = '<div class="preview-error">' +
          '<strong>Не удалось собрать локальное превью.</strong><br>' +
          'Откройте страницу через локальный сервер или VS Code Live Preview, чтобы браузер мог загрузить файлы из <code>capping/tilda-blocks/</code>.<br>' +
          String(error && error.message ? error.message : error) +
        '</div>';
      }

      files.reduce(function (promise, file) {
        return promise.then(function () {
          return fetch(file).then(function (response) {
            if (!response.ok) throw new Error(file + ': HTTP ' + response.status);
            return response.text();
          }).then(appendHtml);
        });
      }, Promise.resolve()).catch(showError);
    })();
  </script>
</body>
</html>
