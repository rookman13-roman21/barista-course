<!-- MBS /capping hosted loader for Tilda — insert once -->
<div id="mbs-capping-hosted-root">
  <section class="mbs-capping-loader-fallback" aria-label="Каппинг кофе">
    <style>
      #mbs-capping-hosted-root,
      #mbs-capping-hosted-root * {
        box-sizing: border-box;
      }

      #mbs-capping-hosted-root {
        font-family: Mulish, Arial, sans-serif;
        color: #1F1F1F;
        background: #FFFFFF;
      }

      .mbs-capping-loader-fallback {
        padding: 70px 20px;
        background: #F5F5F5;
      }

      .mbs-capping-loader-fallback__inner {
        max-width: 1120px;
        margin: 0 auto;
      }

      .mbs-capping-loader-fallback__label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 18px;
        padding: 8px 16px;
        border-radius: 999px;
        background: #E7F2E3;
        color: #417033;
        font-size: 14px;
        line-height: 1;
        font-weight: 900;
      }

      .mbs-capping-loader-fallback__label::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
      }

      .mbs-capping-loader-fallback h1 {
        max-width: 780px;
        margin: 0 0 18px;
        color: #1F1F1F;
        font-size: clamp(42px, 7vw, 78px);
        line-height: .96;
        font-weight: 900;
        letter-spacing: 0;
      }

      .mbs-capping-loader-fallback__lead {
        max-width: 760px;
        margin: 0 0 26px;
        color: #555555;
        font-size: 20px;
        line-height: 1.5;
        font-weight: 700;
      }

      .mbs-capping-loader-fallback__facts {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 0 0 26px;
        padding: 0;
        list-style: none;
      }

      .mbs-capping-loader-fallback__facts li {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 10px 16px;
        border-radius: 999px;
        background: #FFFFFF;
        color: #1F1F1F;
        font-size: 15px;
        line-height: 1.25;
        font-weight: 900;
        box-shadow: 0 10px 28px rgba(31, 31, 31, .06);
      }

      .mbs-capping-loader-fallback__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .mbs-capping-loader-fallback__btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 24px;
        border-radius: 999px;
        border: 1px solid transparent;
        background: #CC2841;
        color: #FFFFFF !important;
        font-size: 16px;
        line-height: 1.1;
        font-weight: 900;
        text-decoration: none;
      }

      .mbs-capping-loader-fallback__btn--ghost {
        border-color: rgba(65, 112, 51, .24);
        background: #FFFFFF;
        color: #417033 !important;
      }

      .mbs-capping-loader-fallback__status {
        margin: 22px 0 0;
        color: #777777;
        font-size: 14px;
        line-height: 1.45;
        font-weight: 800;
      }

      @media (max-width: 640px) {
        .mbs-capping-loader-fallback {
          padding: 44px 16px;
        }

        .mbs-capping-loader-fallback h1 {
          font-size: 46px;
        }

        .mbs-capping-loader-fallback__lead {
          font-size: 17px;
        }

        .mbs-capping-loader-fallback__actions,
        .mbs-capping-loader-fallback__btn {
          width: 100%;
        }
      }
    </style>

    <div class="mbs-capping-loader-fallback__inner">
      <div class="mbs-capping-loader-fallback__label">Каппинг кофе</div>
      <h1>Каппинг кофе</h1>
      <p class="mbs-capping-loader-fallback__lead">
        Открытые дегустации в Московской школе бариста: пробуем кофе, сравниваем вкус и аромат, обсуждаем лоты и выбираем ближайшую дату.
      </p>
      <ul class="mbs-capping-loader-fallback__facts" aria-label="Ключевые условия">
        <li>2,5 часа</li>
        <li>2 000 Р</li>
        <li>Можно без опыта</li>
      </ul>
      <div class="mbs-capping-loader-fallback__actions">
        <a class="mbs-capping-loader-fallback__btn" href="#consalt">Оставить заявку</a>
        <a class="mbs-capping-loader-fallback__btn mbs-capping-loader-fallback__btn--ghost" href="https://t.me/Moscow_barista_school" target="_blank" rel="noopener noreferrer">Написать в Telegram</a>
      </div>
      <p class="mbs-capping-loader-fallback__status">Сейчас покажем расписание, фото и подробности каппингов.</p>
    </div>
  </section>
</div>

<script>
  (function () {
    var root = document.getElementById('mbs-capping-hosted-root');
    if (!root || root.getAttribute('data-mbs-capping-loader-ready') === '1') return;

    root.setAttribute('data-mbs-capping-loader-ready', '1');

    var urls = [
      'https://api.barista-school.ru/api/capping-page.html',
      'https://159-194-202-120.sslip.io/api-fallback/api/capping-page.html'
    ];
    var LOAD_TIMEOUT_MS = 10000;

    function cacheBustedUrl(url) {
      var separator = url.indexOf('?') === -1 ? '?' : '&';
      return url + separator + 'v=' + Date.now();
    }

    function runScripts(container) {
      Array.prototype.slice.call(container.querySelectorAll('script')).forEach(function (oldScript) {
        var script = document.createElement('script');
        Array.prototype.slice.call(oldScript.attributes).forEach(function (attr) {
          script.setAttribute(attr.name, attr.value);
        });
        script.text = oldScript.text || oldScript.textContent || '';
        oldScript.parentNode.replaceChild(script, oldScript);
      });
    }

    function fetchWithTimeout(requestUrl) {
      var controller = window.AbortController ? new AbortController() : null;
      var timeoutId = null;
      var fetchOptions = { cache: 'no-store' };
      if (controller) fetchOptions.signal = controller.signal;

      return new Promise(function (resolve, reject) {
        timeoutId = window.setTimeout(function () {
          if (controller) controller.abort();
          reject(new Error('Timeout'));
        }, LOAD_TIMEOUT_MS);

        fetch(cacheBustedUrl(requestUrl), fetchOptions)
          .then(function (response) {
            window.clearTimeout(timeoutId);
            if (!response.ok) throw new Error('HTTP ' + response.status);
            return response.text();
          })
          .then(resolve)
          .catch(function (error) {
            window.clearTimeout(timeoutId);
            reject(error);
          });
      });
    }

    function validateHostedHtml(html) {
      if (typeof html !== 'string' || html.length < 10000) {
        throw new Error('Short HTML response');
      }
      if (html.indexOf('mbs-capping-page') === -1 || html.indexOf('mbs-capping-widget') === -1) {
        throw new Error('Unexpected HTML response');
      }
      return html;
    }

    function loadFrom(index) {
      return fetchWithTimeout(urls[index])
        .then(validateHostedHtml)
        .catch(function (error) {
          if (index + 1 < urls.length) return loadFrom(index + 1);
          throw error;
        });
    }

    function renderError() {
      root.innerHTML = '' +
        '<section class="mbs-capping-loader-fallback" style="padding:56px 20px;text-align:center;font-family:Mulish,Arial,sans-serif;background:#F5F5F5;color:#1F1F1F">' +
          '<div style="max-width:560px;margin:0 auto;padding:30px 22px;border:1px solid #E7F2E3;border-radius:16px;background:#FFFFFF">' +
            '<div role="heading" aria-level="2" style="margin:0 0 10px;font-size:40px;line-height:1.05;font-weight:900;letter-spacing:0">Каппинг кофе</div>' +
            '<p style="margin:0 0 20px;color:#555;font-size:17px;line-height:1.45;font-weight:700">Страница временно не загрузилась. Напишите нам, и мы поможем выбрать ближайший каппинг.</p>' +
            '<a href="https://t.me/Moscow_barista_school" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 22px;border-radius:999px;background:#417033;color:#fff;text-decoration:none;font-size:16px;font-weight:900">Написать в Telegram</a>' +
            '<div style="margin-top:14px"><button type="button" onclick="window.location.reload()" style="border:0;background:transparent;color:#417033;text-decoration:underline;font:inherit;font-size:14px;font-weight:800;cursor:pointer">Обновить страницу</button></div>' +
          '</div>' +
        '</section>';
    }

    loadFrom(0)
      .then(function (html) {
        root.innerHTML = html;
        runScripts(root);
      })
      .catch(function (error) {
        console.error('[mbs-capping] hosted page load failed', error);
        renderError();
      });
  })();
</script>
