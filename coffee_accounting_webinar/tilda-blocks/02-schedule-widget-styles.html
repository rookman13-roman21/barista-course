<!--
  MBS coffee_accounting_webinar — Tilda block 02 of 05
  Назначение: CSS блока записи без backend-виджета.
-->
<style>
  .mbs-coffee-accounting-webinar__booking {
    padding: 76px 20px;
    background: #F5F5F5;
    font-family: 'Mulish', Arial, sans-serif;
  }

  .mbs-coffee-accounting-webinar__booking-card {
    display: grid;
    max-width: 1100px;
    margin: 0 auto;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 24px;
    align-items: stretch;
    padding: 30px;
    border: 8px solid #E7F2E3;
    border-radius: 28px;
    background: #FFFFFF;
    box-shadow: 0 24px 72px rgba(31, 31, 31, 0.10);
  }

  .mbs-coffee-accounting-webinar__booking-main h2 {
    margin: 0 0 12px;
    color: #1F1F1F;
    font-size: 34px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0;
  }

  .mbs-coffee-accounting-webinar__booking-main p {
    max-width: 640px;
    margin: 0;
    color: #555555;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.55;
  }

  .mbs-coffee-accounting-webinar__booking-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-top: 22px;
    padding: 0;
    list-style: none;
  }

  .mbs-coffee-accounting-webinar__booking-list li {
    padding: 14px 16px;
    border-radius: 16px;
    background: #F5F5F5;
    color: #1F1F1F;
    font-size: 14px;
    font-weight: 800;
    line-height: 1.35;
  }

  .mbs-coffee-accounting-webinar__booking-list span {
    display: block;
    margin-bottom: 4px;
    color: #417033;
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .mbs-coffee-accounting-webinar__booking-side {
    display: flex;
    min-width: 0;
    flex-direction: column;
    justify-content: space-between;
    gap: 18px;
    padding: 22px;
    border-radius: 22px;
    background: #E7F2E3;
  }

  .mbs-coffee-accounting-webinar__price {
    margin: 0;
    color: #1F1F1F;
    font-size: 46px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: 0;
  }

  .mbs-coffee-accounting-webinar__price-note {
    margin: 8px 0 0;
    color: #555555;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.4;
  }

  .mbs-coffee-accounting-webinar__booking-actions {
    display: grid;
    gap: 10px;
    min-width: 0;
  }

  .mbs-coffee-accounting-webinar__booking-actions .mbs-coffee-accounting-webinar__btn,
  .mbs-coffee-accounting-webinar__booking-actions .mbs-coffee-accounting-webinar__btn-secondary {
    width: 100%;
    min-width: 0;
  }

  @media (max-width: 920px) {
    .mbs-coffee-accounting-webinar__booking-card {
      grid-template-columns: 1fr;
      padding: 28px;
    }

    .mbs-coffee-accounting-webinar__booking-actions .mbs-coffee-accounting-webinar__btn,
    .mbs-coffee-accounting-webinar__booking-actions .mbs-coffee-accounting-webinar__btn-secondary {
      white-space: normal;
    }
  }

  @media (max-width: 820px) {
    .mbs-coffee-accounting-webinar__booking {
      padding: 64px 14px;
    }

    .mbs-coffee-accounting-webinar__booking-card {
      padding: 22px;
      border-width: 6px;
      border-radius: 24px;
    }

    .mbs-coffee-accounting-webinar__booking-main h2 {
      font-size: 26px;
      letter-spacing: 0;
    }

    .mbs-coffee-accounting-webinar__booking-list {
      grid-template-columns: 1fr;
    }

    .mbs-coffee-accounting-webinar__price {
      font-size: 42px;
    }
  }

  @media (max-width: 420px) {
    .mbs-coffee-accounting-webinar__booking-card {
      padding: 18px;
    }

    .mbs-coffee-accounting-webinar__booking-side {
      padding: 20px;
    }
  }
</style>

<section class="mbs-coffee-accounting-webinar__booking" id="mbs-coffee-accounting-webinar-booking">
  <div class="mbs-coffee-accounting-webinar__booking-card">
    <div class="mbs-coffee-accounting-webinar__booking-main">
      <span class="mbs-coffee-accounting-webinar__label">Регистрация</span>
      <h2>Забронировать участие</h2>
      <p>После регистрации мы подтвердим участие. Вебинар пройдёт в Zoom, запись и материалы отправим после эфира.</p>
      <ul class="mbs-coffee-accounting-webinar__booking-list">
        <li><span>Когда</span><b data-caw-date-time>Дата уточняется</b></li>
        <li><span>Формат</span>Zoom</li>
        <li><span>Материалы</span>Запись и гид после вебинара</li>
      </ul>
    </div>

    <aside class="mbs-coffee-accounting-webinar__booking-side" aria-label="Стоимость и запись">
      <div>
        <p class="mbs-coffee-accounting-webinar__price">5000 руб</p>
        <p class="mbs-coffee-accounting-webinar__price-note">Стоимость участия</p>
      </div>
      <div class="mbs-coffee-accounting-webinar__booking-actions">
        <a
          class="mbs-coffee-accounting-webinar__btn js-mbs-caw-booking"
          href="#waiting_list"
          data-before-text="Записаться на вебинар"
          data-after-text="Лист ожидания"
        >Записаться на вебинар</a>
        <a class="mbs-coffee-accounting-webinar__btn-secondary" href="#consalt">Задать вопрос</a>
      </div>
    </aside>
  </div>
</section>
