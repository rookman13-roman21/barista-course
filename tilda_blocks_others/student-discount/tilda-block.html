<!-- MBS student discount block: standalone Tilda HTML fragment -->
<section class="mbs-student-discount" aria-label="Скидка для школьников и студентов">
  <style>
    .mbs-student-discount {
      box-sizing: border-box;
      width: 100%;
      padding: 42px 20px;
      font-family: "Mulish", Arial, sans-serif;
      color: #24262b;
      background: transparent;
    }

    .mbs-student-discount *,
    .mbs-student-discount *::before,
    .mbs-student-discount *::after {
      box-sizing: border-box;
    }

    .mbs-student-discount__card {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: 34px 42px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 28px;
      background: #ffffff;
      border: 3px solid #ec98a7;
      border-radius: 20px;
    }

    .mbs-student-discount__label {
      margin: 0 0 12px;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 800;
      color: #cc2841;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .mbs-student-discount__title {
      margin: 0;
      max-width: 720px;
      font-size: 32px;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
      color: #24262b;
    }

    .mbs-student-discount__text {
      margin: 16px 0 0;
      max-width: 690px;
      font-size: 20px;
      line-height: 1.45;
      font-weight: 500;
      letter-spacing: 0;
      color: #3e424a;
    }

    .mbs-student-discount__mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 236px;
      min-height: 58px;
      padding: 16px 24px;
      border-radius: 999px;
      background: #d83d54;
      color: #ffffff;
      font-size: 16px;
      line-height: 1.25;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0;
      white-space: normal;
    }

    @media (max-width: 760px) {
      .mbs-student-discount {
        padding: 28px 16px;
      }

      .mbs-student-discount__card {
        grid-template-columns: 1fr;
        padding: 26px 22px;
        gap: 22px;
        border-radius: 18px;
      }

      .mbs-student-discount__label {
        font-size: 13px;
      }

      .mbs-student-discount__title {
        font-size: 25px;
        line-height: 1.22;
      }

      .mbs-student-discount__text {
        font-size: 17px;
        line-height: 1.45;
      }

      .mbs-student-discount__mark {
        width: 100%;
        min-width: 0;
        min-height: 54px;
        padding: 15px 18px;
        font-size: 15px;
      }
    }
  </style>

  <div class="mbs-student-discount__card">
    <div class="mbs-student-discount__content">
      <p class="mbs-student-discount__label">До 31 августа 2026 года</p>
      <h2 class="mbs-student-discount__title">Скидка 10% школьникам и студентам</h2>
      <p class="mbs-student-discount__text">На индивидуальные курсы бариста в Московской школе бариста.</p>
    </div>
    <div class="mbs-student-discount__mark">Только индивидуальные курсы</div>
  </div>
</section>
