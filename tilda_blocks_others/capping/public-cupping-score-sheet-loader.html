<!--
  MBS* Public Cupping Score Sheet Loader
  Для страницы Tilda: https://baristaschool.ru/capping_list
  Вставить на страницу только этот loader.
-->
<section class="mbs-public-cs-loader" id="mbsPublicCuppingScoreSheetLoader">
  <style>
    .mbs-public-cs-loader,
    .mbs-public-cs-loader * {
      box-sizing: border-box;
    }

    .mbs-public-cs-loader {
      width: 100%;
      min-height: 360px;
      padding: 48px 20px;
      background: #F5F5F5;
      color: #1F1F1F;
      font-family: Mulish, Arial, sans-serif;
    }

    .mbs-public-cs-loader__box {
      width: min(760px, 100%);
      margin: 0 auto;
      border: 1px solid rgba(65, 112, 51, .16);
      border-radius: 24px;
      padding: 28px;
      background: #FFFFFF;
      box-shadow: 0 18px 56px rgba(31, 31, 31, .08);
    }

    .mbs-public-cs-loader__title {
      margin: 0;
      color: #1F1F1F;
      font-size: 34px;
      font-weight: 900;
      line-height: 1.05;
    }

    .mbs-public-cs-loader__text {
      margin: 12px 0 0;
      color: #555555;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.5;
    }

    .mbs-public-cs-loader__error {
      margin-top: 16px;
      border-radius: 16px;
      padding: 14px 16px;
      background: #F8DDE1;
      color: #8E2635;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
    }

    @media (max-width: 640px) {
      .mbs-public-cs-loader {
        padding: 18px 12px;
      }

      .mbs-public-cs-loader__box {
        padding: 20px;
      }

      .mbs-public-cs-loader__title {
        font-size: 28px;
      }
    }
  </style>

  <div class="mbs-public-cs-loader__box" data-public-cs-loader-state>
    <h1 class="mbs-public-cs-loader__title">Оценочный лист каппинга</h1>
    <p class="mbs-public-cs-loader__text">Загружаем публичный лист. Авторизация не нужна.</p>
  </div>

  <script>
    (function () {
      var root = document.getElementById('mbsPublicCuppingScoreSheetLoader');
      if (!root) return;

      var fragmentUrl = 'https://api.barista-school.ru/api/public-cupping-score-sheet.html';
      var state = root.querySelector('[data-public-cs-loader-state]');

      function showError(message) {
        if (!state) return;
        state.innerHTML = '<h1 class="mbs-public-cs-loader__title">Оценочный лист каппинга</h1>' +
          '<p class="mbs-public-cs-loader__text">Не получилось загрузить лист автоматически.</p>' +
          '<div class="mbs-public-cs-loader__error">' + message + '</div>';
      }

      function injectFragment(html) {
        var template = document.createElement('template');
        template.innerHTML = html;
        var scripts = Array.prototype.slice.call(template.content.querySelectorAll('script'));
        scripts.forEach(function (script) {
          if (script.parentNode) script.parentNode.removeChild(script);
        });

        root.replaceChildren(template.content.cloneNode(true));

        scripts.forEach(function (oldScript) {
          var script = document.createElement('script');
          Array.prototype.slice.call(oldScript.attributes).forEach(function (attr) {
            script.setAttribute(attr.name, attr.value);
          });
          script.textContent = oldScript.textContent || '';
          document.body.appendChild(script);
        });
      }

      fetch(fragmentUrl + '?v=' + Date.now(), {
        method: 'GET',
        credentials: 'omit',
        cache: 'no-store',
        headers: { 'Accept': 'text/html' }
      })
        .then(function (response) {
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return response.text();
        })
        .then(injectFragment)
        .catch(function () {
          showError('Обновите страницу. Если ошибка повторяется, сообщите администратору сайта.');
        });
    })();
  </script>
</section>
