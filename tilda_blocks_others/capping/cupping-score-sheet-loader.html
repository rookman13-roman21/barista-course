<!--
  MBS* Cupping Score Sheet Loader
  Вставляется в HTML-блок Tilda на странице /cupping_score_sheet.
  Сам оценочный лист обновляется на сервере:
  https://api.barista-school.ru/api/gift/fragments/cupping-score-sheet.html
-->
<section id="mbsCuppingScoreSheetLoader" style="min-height:60vh;background:#F5F5F5;font-family:Mulish,Arial,sans-serif;">
  <div style="max-width:760px;margin:0 auto;padding:48px 20px;color:#1F1F1F;">
    <strong style="display:block;font-size:28px;line-height:1.1;">Загружаем оценочный лист...</strong>
    <p style="margin:12px 0 0;color:#626B60;font-size:16px;line-height:1.45;">Если загрузка не началась, откройте каппинг из личного кабинета.</p>
  </div>
</section>
<script>
  (function () {
    var root = document.getElementById('mbsCuppingScoreSheetLoader');
    if (!root) return;

    var token = localStorage.getItem('mbsGiftCabinetToken') || '';
    var params = new URLSearchParams(window.location.search);
    var cuppingId = params.get('cupping_id') || params.get('event_id') || '';

    function showMessage(title, text, link) {
      root.innerHTML = '<div style="max-width:760px;margin:0 auto;padding:48px 20px;color:#1F1F1F;">' +
        '<strong style="display:block;font-size:32px;line-height:1.1;">' + title + '</strong>' +
        '<p style="margin:12px 0 22px;color:#626B60;font-size:16px;line-height:1.45;">' + text + '</p>' +
        (link ? '<a href="' + link + '" style="display:inline-flex;min-height:48px;align-items:center;justify-content:center;border-radius:999px;padding:12px 20px;background:#417033;color:#fff;font-weight:900;text-decoration:none;">Вернуться в личный кабинет</a>' : '') +
      '</div>';
    }

    if (!token || !cuppingId) {
      showMessage(
        'Оценочный лист открывается из личного кабинета',
        'Вернитесь в раздел «Занятия», откройте карточку каппинга и нажмите «Открыть оценочный лист».',
        '/cabinet/gift#schedule'
      );
      return;
    }

    fetch('https://api.barista-school.ru/api/gift/fragments/cupping-score-sheet.html?v=' + Date.now(), {
      headers: { Accept: 'text/html' }
    }).then(function (response) {
      if (!response.ok) throw new Error('fragment_load_failed');
      return response.text();
    }).then(function (html) {
      var template = document.createElement('template');
      template.innerHTML = html;
      var scripts = Array.prototype.slice.call(template.content.querySelectorAll('script'));
      scripts.forEach(function (script) {
        script.parentNode.removeChild(script);
      });
      root.innerHTML = '';
      root.appendChild(template.content.cloneNode(true));
      scripts.forEach(function (oldScript) {
        var script = document.createElement('script');
        Array.prototype.forEach.call(oldScript.attributes, function (attr) {
          script.setAttribute(attr.name, attr.value);
        });
        script.text = oldScript.text || oldScript.textContent || '';
        root.appendChild(script);
      });
    }).catch(function () {
      showMessage(
        'Не удалось загрузить оценочный лист',
        'Обновите страницу. Если ошибка повторится, напишите администратору.',
        '/cabinet/gift#schedule'
      );
    });
  })();
</script>
