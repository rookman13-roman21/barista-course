<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Экскурсия на обжарочное производство — локальное превью</title>
  <meta name="description" content="Локальное превью новой страницы экскурсии на обжарочное производство для Московской школы бариста.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: #FFFFFF;
      color: #1F1F1F;
      font-family: 'Mulish', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .preview-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 42px;
      padding: 10px 16px;
      background: #1F1F1F;
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      text-align: center;
    }
    .preview-bar a {
      color: #B6D8AB;
      font-weight: 900;
      text-decoration: none;
    }
    .preview-frame {
      display: block;
      width: 100%;
      min-height: 100vh;
      border: 0;
      background: #FFFFFF;
    }
    @media (max-width: 820px) {
      .preview-bar {
        position: static;
        display: block;
      }
      .preview-bar a {
        display: block;
        margin-top: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="preview-bar">
    Превью страницы «Экскурсия на обжарочное производство»
    <a href="https://baristaschool.ru/excu" target="_blank" rel="noopener noreferrer">Текущая страница</a>
  </div>
  <iframe class="preview-frame" src="./tilda-block.html" title="Новая страница экскурсии" id="preview-frame"></iframe>
  <script>
    (function () {
      var frame = document.getElementById('preview-frame');
      if (!frame) return;

      function resizeFrame() {
        try {
          var doc = frame.contentDocument || frame.contentWindow.document;
          var body = doc.body;
          var html = doc.documentElement;
          var height = Math.max(
            body ? body.scrollHeight : 0,
            body ? body.offsetHeight : 0,
            html ? html.clientHeight : 0,
            html ? html.scrollHeight : 0,
            html ? html.offsetHeight : 0
          );
          frame.style.height = Math.max(height, window.innerHeight - 42) + 'px';
        } catch (error) {
          frame.style.height = '100vh';
        }
      }

      frame.addEventListener('load', function () {
        resizeFrame();
        setTimeout(resizeFrame, 300);
        setTimeout(resizeFrame, 1200);
      });
      window.addEventListener('resize', resizeFrame, { passive: true });
    })();
  </script>
</body>
</html>
