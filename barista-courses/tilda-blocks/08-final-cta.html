<style>
  .mbs-bc-final { font-family: 'Mulish', sans-serif; background: #fff; padding: 90px 20px; }
  .mbs-bc-final * { box-sizing: border-box; }
  .mbs-bc-final__wrap { max-width: 1100px; margin: 0 auto; padding: 64px 72px; border-radius: 28px; background: #E7F2E3; display: grid; grid-template-columns: 1fr 260px; gap: 60px; align-items: center; }
  .mbs-bc-final__title { margin: 0 0 14px; color: #1F1F1F; font-size: 40px; font-weight: 900; line-height: 1.1; letter-spacing: -0.04em; }
  .mbs-bc-final__text { max-width: 620px; margin: 0; color: #555; font-size: 16px; font-weight: 500; line-height: 1.55; }
  .mbs-bc-final__actions { display: flex; flex-direction: column; gap: 12px; min-width: 260px; }
  .mbs-bc-final__btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 58px;
    padding: 0 28px;
    border-radius: 999px;
    text-decoration: none !important;
    font-size: 16px;
    font-weight: 900;
    line-height: 1;
    text-align: center;
    transition: background .2s, border-color .2s, transform .15s;
  }
  .mbs-bc-final__btn svg,
  .mbs-bc-final__contact-link svg { flex: 0 0 auto; width: 18px; height: 18px; }
  .mbs-bc-final__btn--primary {
    background: #CC2841;
    color: #fff !important;
    -webkit-text-fill-color: #fff !important;
  }
  .mbs-bc-final__btn--primary:hover { background: #D83D54; transform: translateY(-2px); }
  .mbs-bc-final__btn--secondary {
    background: rgba(255,255,255,.85);
    border: 2px solid rgba(65,112,51,.2);
    color: #417033 !important;
    -webkit-text-fill-color: #417033 !important;
  }
  .mbs-bc-final__btn--secondary:hover { background: #fff; border-color: #417033; transform: translateY(-2px); }
  .mbs-bc-final__contacts { margin-top: 20px; display: grid; gap: 8px; }
  .mbs-bc-final__contact-link {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #555 !important;
    -webkit-text-fill-color: #555 !important;
    text-decoration: none !important;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
    transition: color .2s;
  }
  .mbs-bc-final__contact-link svg { color: #417033; }
  .mbs-bc-final__contact-link:hover {
    color: #417033 !important;
    -webkit-text-fill-color: #417033 !important;
  }
  @media (max-width: 820px) {
    .mbs-bc-final { padding: 64px 14px; }
    .mbs-bc-final__wrap { grid-template-columns: 1fr; gap: 36px; padding: 44px 28px; }
    .mbs-bc-final__title { font-size: 30px; }
    .mbs-bc-final__text { font-size: 16px; }
    .mbs-bc-final__actions { min-width: 0; width: 100%; }
    .mbs-bc-final__contact-link { font-size: 14px; }
  }
</style>
