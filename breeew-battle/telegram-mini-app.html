<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>MBS* Breeew battle</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #f5f5f5);
      --card: var(--tg-theme-secondary-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #1f1f1f);
      --muted: var(--tg-theme-hint-color, #6f766c);
      --green: #417033;
      --green-soft: #e7f2e3;
      --red: #cc2841;
      --red-soft: #f8dde1;
      --border: rgba(65, 112, 51, .18);
      --shadow: 0 10px 28px rgba(31, 31, 31, .08);
      --nav: color-mix(in srgb, var(--card) 92%, transparent);
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #1e1e1e;
      --card: #252526;
      --text: #f3f3f3;
      --muted: #c8c8c8;
      --green: #89d185;
      --green-soft: #223322;
      --red: #ff6b7a;
      --red-soft: #3a2028;
      --border: rgba(137, 209, 133, .18);
      --shadow: none;
      --nav: rgba(24, 24, 24, .96);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        color-scheme: dark;
        --bg: #1e1e1e;
        --card: #252526;
        --text: #f3f3f3;
        --muted: #c8c8c8;
        --green: #89d185;
        --green-soft: #223322;
        --red: #ff6b7a;
        --red-soft: #3a2028;
        --border: rgba(137, 209, 133, .18);
        --shadow: none;
        --nav: rgba(24, 24, 24, .96);
      }
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Mulish, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    button, a { font: inherit; }

    .app {
      min-height: 100vh;
      padding: max(16px, env(safe-area-inset-top)) 14px calc(92px + env(safe-area-inset-bottom));
    }

    .hero {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(135deg, var(--green-soft), var(--card) 70%);
      box-shadow: var(--shadow);
    }

    .label {
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(65, 112, 51, .12);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: 30px;
      line-height: 1.04;
      font-weight: 1000;
      letter-spacing: 0;
    }

    h2 {
      font-size: 22px;
      line-height: 1.12;
      font-weight: 1000;
      letter-spacing: 0;
    }

    h3 {
      font-size: 16px;
      line-height: 1.22;
      font-weight: 900;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 650;
    }

    p a,
    .pill a {
      color: var(--green);
      font-weight: 900;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .hero__meta,
    .counter,
    .quick {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .pill,
    .counter__item,
    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
    }

    .pill {
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      font-weight: 850;
      line-height: 1.25;
    }

    .pill a {
      display: inline-block;
    }

    .pill span,
    .counter__item span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .counter__item {
      min-height: 82px;
      padding: 12px;
    }

    .counter__item strong {
      display: block;
      font-size: 20px;
      line-height: 1.08;
      font-weight: 1000;
      overflow-wrap: anywhere;
    }

    .counter__item--wide { grid-column: 1 / -1; }

    .section {
      display: none;
      gap: 14px;
      padding-top: 16px;
    }

    .section.is-active { display: grid; }

    .section__head {
      display: grid;
      gap: 6px;
      padding: 4px 2px;
    }

    .card {
      display: grid;
      gap: 10px;
      padding: 14px;
      overflow: hidden;
    }

    .card--green {
      background: var(--green-soft);
      border-color: rgba(65, 112, 51, .28);
    }

    .card--red {
      background: var(--red-soft);
      border-color: rgba(204, 40, 65, .22);
    }

    .list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .list li {
      position: relative;
      padding-left: 18px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.42;
      font-weight: 700;
    }

    .list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: .58em;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 12px 16px;
      border: 0;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 15px;
      font-weight: 950;
      text-decoration: none;
      cursor: pointer;
    }

    .card__actions {
      display: grid;
      gap: 8px;
    }

    .btn--secondary {
      border: 1px solid rgba(65, 112, 51, .35);
      background: var(--card);
      color: var(--green);
    }

    .participants,
    .timings,
    .judges,
    .prizes,
    .faq {
      display: grid;
      gap: 10px;
    }

    .participation {
      display: grid;
      gap: 10px;
    }

    .asset-card {
      display: grid;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      overflow: hidden;
    }

    .asset-card__media {
      display: grid;
      place-items: center;
      min-height: 104px;
      padding: 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid transparent;
    }

    .asset-card__media img {
      display: block;
      max-width: 100%;
      max-height: 180px;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .asset-card__media--wide img {
      width: 100%;
      max-height: none;
    }

    .asset-card__body {
      display: grid;
      gap: 6px;
    }

    .asset-card__body strong {
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
      font-weight: 950;
    }

    .asset-card__body span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 750;
    }

    .participant {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
    }

    .participant__num {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--green-soft);
      color: var(--green);
      font-size: 13px;
      font-weight: 1000;
    }

    .participant__body {
      display: grid;
      min-width: 0;
      gap: 7px;
    }

    .participant strong,
    .judge strong {
      display: block;
      color: var(--text);
      font-size: 15px;
      line-height: 1.2;
      font-weight: 950;
    }

    .participant span,
    .judge span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
      font-weight: 700;
    }

    .participant__action {
      justify-self: start;
      min-height: 30px;
      padding: 6px 10px;
      border: 0;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 950;
      cursor: pointer;
    }

    .judge {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 12px;
      align-items: center;
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .judge img {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      object-fit: cover;
      background: var(--green-soft);
    }

    .timing-section {
      display: grid;
      gap: 8px;
    }

    .timing-section__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 4px 2px;
    }

    .timing-section__head h3 {
      font-size: 16px;
    }

    .timing-section__head span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .timing-jump {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .timing-jump::-webkit-scrollbar {
      display: none;
    }

    .timing-jump button {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .timing-row,
    .timing-break {
      display: grid;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
    }

    .timing-row__top {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
    }

    .timing-row__pair {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 12px;
      font-weight: 1000;
    }

    .timing-row__people {
      display: grid;
      min-width: 0;
      gap: 4px;
    }

    .timing-row__people strong {
      color: var(--text);
      font-size: 14px;
      line-height: 1.2;
      font-weight: 950;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timing-row__pending {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
      font-weight: 800;
    }

    .timing-row__times {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 5px;
    }

    .timing-row__times span {
      display: grid;
      gap: 3px;
      min-height: 40px;
      padding: 7px;
      border-radius: 10px;
      background: var(--green-soft);
      color: var(--text);
      font-size: 11px;
      line-height: 1.18;
      font-weight: 900;
    }

    .timing-row__times span.is-main {
      background: var(--green);
      color: #fff;
    }

    .timing-row__times span.is-main small {
      color: rgba(255, 255, 255, .78);
    }

    .timing-row__times small {
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
    }

    .timing-break {
      align-items: center;
      justify-items: center;
      gap: 4px;
      min-height: 54px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 15px;
      font-weight: 1000;
      text-align: center;
    }

    .timing-break strong {
      display: block;
      font-size: 15px;
      line-height: 1.15;
    }

    .timing-break span {
      display: block;
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.2;
      opacity: .82;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 16px 14px calc(16px + env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, .45);
      z-index: 10;
    }

    .modal[hidden] { display: none; }

    .modal__panel {
      display: grid;
      gap: 14px;
      width: min(100%, 420px);
      max-height: min(78vh, 620px);
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      color: var(--text);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .modal__head {
      display: grid;
      grid-template-columns: 72px 1fr 36px;
      gap: 12px;
      align-items: start;
    }

    .modal__head img {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      object-fit: cover;
      background: var(--green-soft);
    }

    .modal__close {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: transparent;
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .prize {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      overflow: hidden;
    }

    .prize__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
      background: var(--green-soft);
    }

    .prize__body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .prize__group {
      display: grid;
      gap: 6px;
    }

    details {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      overflow: hidden;
    }

    summary {
      min-height: 52px;
      padding: 14px;
      color: var(--text);
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    details p {
      padding: 0 14px 14px;
    }

    .faq__link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 14px 14px;
      min-height: 38px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--green);
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
    }

    .faq__image {
      display: block;
      width: calc(100% - 28px);
      max-height: 260px;
      margin: 0 14px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      object-fit: contain;
    }

    .empty,
    .access {
      display: grid;
      gap: 12px;
      place-items: center;
      min-height: 55vh;
      padding: 24px;
      text-align: center;
    }

    .access .card {
      max-width: 360px;
      text-align: left;
    }

    .nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: max-content;
      justify-content: start;
      gap: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--nav);
      backdrop-filter: blur(16px);
      scroll-snap-type: x proximity;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      z-index: 5;
    }

    .nav::-webkit-scrollbar {
      display: none;
    }

    .nav button {
      min-width: 82px;
      min-height: 44px;
      padding: 6px 12px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      line-height: 1.05;
      cursor: pointer;
      scroll-snap-align: center;
      white-space: nowrap;
    }

    .nav button.is-active {
      background: var(--green-soft);
      color: var(--green);
    }

    @supports not (color: color-mix(in srgb, white, black)) {
      .nav { background: var(--card); }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="access">
      <div class="card">
        <div class="label">MBS* Breeew battle</div>
        <h1>Загружаем информацию</h1>
        <p>Откройте мини-приложение из Telegram-чата участников чемпионата.</p>
      </div>
    </div>
  </main>

  <nav class="nav" id="nav" hidden>
    <button type="button" data-tab="home" class="is-active">Главное</button>
    <button type="button" data-tab="rules">Регламент</button>
    <button type="button" data-tab="participants">Участники</button>
    <button type="button" data-tab="judges">Судьи</button>
    <button type="button" data-tab="prizes">Призы</button>
    <button type="button" data-tab="faq">FAQ</button>
  </nav>

  <div class="modal" id="judgeModal" hidden></div>

  <script>
    (function () {
      var API_URL = 'https://api.barista-school.ru/api/course-booking/breeew-battle/telegram-mini-app-data';
      var MAP_URL = 'https://yandex.ru/maps/org/moskovskaya_shkola_barista/206204133172/?ll=37.674068%2C55.774689&z=16';
      var REFRESH_INTERVAL_MS = 60 * 1000;
      var app = document.getElementById('app');
      var nav = document.getElementById('nav');
      var judgeModal = document.getElementById('judgeModal');
      var tg = window.Telegram && window.Telegram.WebApp;
      var state = { payload: null, activeTab: 'home', refreshTimer: null };

      function syncTheme() {
        document.documentElement.setAttribute('data-theme', tg && tg.colorScheme === 'dark' ? 'dark' : 'light');
      }

      function esc(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function showAccess(message) {
        nav.hidden = true;
        app.innerHTML = '<div class="access"><div class="card card--red">' +
          '<div class="label">Доступ к памятке</div>' +
          '<h1>Откройте из чата участников</h1>' +
          '<p>' + esc(message || 'Мини-приложение доступно только участникам чемпионата.') + '</p>' +
        '</div></div>';
      }

      function showLoading() {
        app.innerHTML = '<div class="access"><div class="card">' +
          '<div class="label">MBS* Breeew battle</div>' +
          '<h1>Загружаем информацию</h1>' +
          '<p>Проверяем доступ и обновляем данные чемпионата.</p>' +
        '</div></div>';
      }

      function list(items) {
        return '<ul class="list">' + (items || []).map(function (item) {
          return '<li>' + esc(item) + '</li>';
        }).join('') + '</ul>';
      }

      function textWithBreaks(value) {
        return esc(value).replace(/\n/g, '<br>');
      }

      function rulesPdfUrl(url) {
        var source = String(url || '');
        var match = source.match(/\/document\/d\/([^/]+)/);
        return match ? 'https://docs.google.com/document/d/' + encodeURIComponent(match[1]) + '/export?format=pdf' : source;
      }

      function renderHeroMetaItem(item) {
        var title = String(item.title || '').toLowerCase();
        var value = esc(item.value);
        var body = MAP_URL && (title === 'площадка' || title === 'адрес')
          ? '<a href="' + esc(MAP_URL) + '" target="_blank" rel="noopener">' + value + '</a>'
          : value;
        return '<div class="pill"><span>' + esc(item.title) + '</span>' + body + '</div>';
      }

      function renderHero(data, content) {
        var counters = data.counters || {};
        var participants = Array.isArray(data.participants) ? data.participants : [];
        var registered = Number(counters.registered || participants.length || 0);
        var capacity = Number(counters.capacity || (data.event && data.event.capacity) || 20);
        var participantText = registered > 0 ? (registered + ' / ' + capacity) : (capacity + ' мест');
        var schedule = (content.schedule || []).filter(function (item) {
          var title = String(item.title || '').toLowerCase();
          return title !== 'взнос' && title !== 'участники';
        });
        return '<section class="hero">' +
          '<div class="label">Памятка участника</div>' +
          '<h1>MBS* Breeew battle</h1>' +
          '<p>Здесь собрана актуальная информация на день чемпионата: регламент, участники, судьи, призы и ответы на вопросы.</p>' +
          '<div class="hero__meta">' + schedule.map(renderHeroMetaItem).join('') + '</div>' +
          '<div class="counter">' +
            '<div class="counter__item"><span>Статус</span><strong>' + esc((data.event && data.event.status) === 'completed' ? 'Завершён' : 'Готовимся') + '</strong></div>' +
            '<div class="counter__item"><span>Формат</span><strong>2 этапа</strong></div>' +
            '<div class="counter__item"><span>Сбор</span><strong>Приходите заранее</strong></div>' +

      function renderRules(content) {
        return '<section class="section" data-section="rules">' +
          '<div class="section__head"><h2>Регламент</h2><p>Основные правила собраны здесь, полный документ откроется отдельной ссылкой.</p></div>' +

      function normalizeParticipantName(value) {
        return String(value || '')
          .toLowerCase()
          .replace(/ё/g, 'е')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function timingRowKey(section, row, rowIndex) {
        return [
          section && section.type ? section.type : 'timing',
          row && row.pair ? row.pair : rowIndex + 1,
          rowIndex + 1
        ].join('-').replace(/[^a-z0-9а-я_-]+/gi, '-');
      }

      function addParticipantTiming(map, name, info) {
        var key = normalizeParticipantName(name);
        if (key && !map[key]) map[key] = info;
      }

      function timingPairNumber(value) {
        var match = String(value || '').match(/\d+/);
        return match ? Number(match[0]) : Number.POSITIVE_INFINITY;
      }

      function participantTimingIndex(data) {
        var map = {};
        (data.timings || []).forEach(function (section, sectionIndex) {
          if (!section || section.type === 'break') return;
          (section.rows || []).forEach(function (row, rowIndex) {
            var info = {
              key: timingRowKey(section, row, rowIndex),
              pair: row.pair || '',
              section: timingTitle(section),
              prep: row.prep_time || '',
              performance: row.performance_time || '',
              cleanup: row.cleanup_time || '',
              pairNumber: timingPairNumber(row.pair),
              rowOrder: sectionIndex * 1000 + rowIndex
            };
            addParticipantTiming(map, row.participant_a, Object.assign({ participantOrder: 0 }, info));
            addParticipantTiming(map, row.participant_b, Object.assign({ participantOrder: 1 }, info));
          });
        });
        return map;
      }

      function participantName(item) {
        var firstName = String(item && item.first_name || '').trim();
        var lastName = String(item && item.last_name || '').trim();
        return [firstName, lastName].filter(Boolean).join(' ') || 'Участник';
      }

      function sortParticipantsByTiming(items, timings) {
        return items.map(function (item, originalIndex) {
          var name = participantName(item);
          return {
            item: item,
            name: name,
            timing: timings[normalizeParticipantName(name)],
            originalIndex: originalIndex
          };
        }).sort(function (a, b) {
          if (!!a.timing !== !!b.timing) return a.timing ? -1 : 1;
          if (!a.timing || !b.timing) return a.originalIndex - b.originalIndex;
          if (a.timing.pairNumber !== b.timing.pairNumber) return a.timing.pairNumber - b.timing.pairNumber;
          if (a.timing.rowOrder !== b.timing.rowOrder) return a.timing.rowOrder - b.timing.rowOrder;
          if (a.timing.participantOrder !== b.timing.participantOrder) return a.timing.participantOrder - b.timing.participantOrder;
          return a.originalIndex - b.originalIndex;
        });
      }

      function renderParticipants(data) {
        var items = data.participants || [];
        var rows = items.length ? items.map(function (item, index) {
          var name = participantName(item);
          return '<div class="participant">' +
            '<div class="participant__num">' + esc(index + 1) + '</div>' +
            '<div class="participant__body"><div><strong>' + esc(name) + '</strong><span>' + esc(item.project_name || 'Проект не указан') + '</span></div></div>' +
          '</div>';
        }).join('') : '<div class="card"><h3>Список скоро появится</h3><p>Участники появляются после подтверждения места.</p></div>';
        return '<section class="section" data-section="participants">' +
          '<div class="section__head"><h2>Участники</h2><p>Список обновляется после подтверждения места участника.</p></div>' +
          '<div class="participants">' + rows + '</div>' +
        '</section>';
      }

      function timingTitle(section) {
        if (section && section.title) return section.title;
        if (section && section.type === 'qualifier') return 'Отборочный этап';
        if (section && section.type === 'battle') return 'Батлы';
        if (section && section.type === 'final') return 'Финал';
        return 'Тайминг';
      }

      function timingParticipant(value, fallback) {
        var text = String(value || '').trim();
        return text || fallback;
      }

      function timingParticipantsHtml(row) {
        var first = String(row.participant_a || '').trim();
        var second = String(row.participant_b || '').trim();
        if (!first && !second) {
          return '<span class="timing-row__pending">Имена появятся после жеребьёвки</span>';
        }
        return '<strong>' + esc(timingParticipant(first, 'Участник A')) + '</strong>' +
          '<strong>' + esc(timingParticipant(second, 'Участник B')) + '</strong>';
      }

      function renderTimingRow(row, section, rowIndex) {
        return '<article class="timing-row" data-timing-row="' + esc(timingRowKey(section, row, rowIndex)) + '">' +
          '<div class="timing-row__top">' +
            '<span class="timing-row__pair">Пара ' + esc(row.pair || '—') + '</span>' +
            '<div class="timing-row__people">' + timingParticipantsHtml(row) + '</div>' +
          '</div>' +
          '<div class="timing-row__times">' +
            '<span><small>Подготовка</small>' + esc(row.prep_time || '—') + '</span>' +
            '<span class="is-main"><small>Выступление</small>' + esc(row.performance_time || '—') + '</span>' +
            '<span><small>Уборка</small>' + esc(row.cleanup_time || '—') + '</span>' +
          '</div>' +
        '</article>';
      }

      function timingRows(section) {
        return section && Array.isArray(section.rows) ? section.rows : [];
      }

      function timingHasTime(row) {
        return !!(row && (row.prep_time || row.performance_time || row.cleanup_time));
      }

      function lastTimingRowBefore(sections, index) {
        for (var i = index - 1; i >= 0; i -= 1) {
          var rows = timingRows(sections[i]);
          for (var j = rows.length - 1; j >= 0; j -= 1) {
            if (timingHasTime(rows[j])) return rows[j];
          }
        }
        return null;
      }

      function firstTimingRowAfter(sections, index) {
        for (var i = index + 1; i < sections.length; i += 1) {
          var rows = timingRows(sections[i]);
          for (var j = 0; j < rows.length; j += 1) {
            if (timingHasTime(rows[j])) return rows[j];
          }
        }
        return null;
      }

      function normalizeTime(value) {
        var parts = String(value || '').replace('.', ':').split(':');
        if (parts.length !== 2) return '';
        var hours = Number(parts[0]);
        var minutes = Number(parts[1]);
        if (!Number.isFinite(hours) || !Number.isFinite(minutes)) return '';
        return String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0');
      }

      function timingRangeParts(value) {
        var text = String(value || '').trim();
        var match = text.match(/(\d{1,2}[:.]\d{2})\s*[–—-]\s*(\d{1,2}[:.]\d{2})/);
        if (!match) return null;
        return {
          start: normalizeTime(match[1]),
          end: normalizeTime(match[2])
        };
      }

      function timeToMinutes(value) {
        var parts = String(value || '').split(':');
        if (parts.length !== 2) return NaN;
        return Number(parts[0]) * 60 + Number(parts[1]);
      }

      function pluralMinutes(value) {
        var mod10 = value % 10;
        var mod100 = value % 100;
        if (mod10 === 1 && mod100 !== 11) return value + ' минута';
        if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return value + ' минуты';
        return value + ' минут';
      }

      function timingBreakInfo(sections, index) {
        var before = lastTimingRowBefore(sections, index);
        var after = firstTimingRowAfter(sections, index);
        var beforeRange = timingRangeParts(before && before.cleanup_time);
        var afterRange = timingRangeParts(after && after.prep_time);
        if (!beforeRange || !afterRange || !beforeRange.end || !afterRange.start) return null;
        var from = timeToMinutes(beforeRange.end);
        var to = timeToMinutes(afterRange.start);
        if (!Number.isFinite(from) || !Number.isFinite(to)) return null;
        if (to < from) to += 24 * 60;
        var duration = to - from;
        if (duration <= 0) return null;
        return {
          duration: pluralMinutes(duration),
          range: beforeRange.end + '–' + afterRange.start
        };
      }

      function renderTimingSection(section, index, sections) {
        if (section.type === 'break') {
          var info = timingBreakInfo(sections || [], index);
          return '<div class="timing-break"><strong>' + esc(section.title || 'Перерыв') + '</strong>' +
            (info ? '<span>' + esc(info.duration + ' · ' + info.range) + '</span>' : '') +
          '</div>';
        }
        var rows = section.rows || [];
        return '<div class="timing-section" data-timing-section="' + esc(section.type || '') + '">' +
          '<div class="timing-section__head"><h3>' + esc(timingTitle(section)) + '</h3><span>' + esc(rows.length) + '</span></div>' +
          rows.map(function (row, rowIndex) {
            return renderTimingRow(row, section, rowIndex);
          }).join('') +
        '</div>';
      }

      function renderTimingJump(sections) {
        var seen = {};
        var items = (sections || []).filter(function (section) {
          if (!section || section.type === 'break' || seen[section.type]) return false;
          seen[section.type] = true;
          return true;
        });
        if (!items.length) return '';
        return '<div class="timing-jump">' + items.map(function (section) {
          return '<button type="button" data-timing-jump="' + esc(section.type) + '">' + esc(timingTitle(section)) + '</button>';
        }).join('') + '</div>';
      }

      function renderTiming(data) {
        var sections = data.timings || [];
        var body = sections.length
          ? sections.map(function (section, index) {
            return renderTimingSection(section, index, sections);
          }).join('')
          : '<div class="card"><h3>Тайминг появится позже</h3><p>Тайминг появится после обновления таблицы организаторами.</p></div>';
        return '<section class="section" data-section="timing">' +
          '<div class="section__head"><h2>Тайминг</h2><p>Имена появятся после жеребьёвки.</p></div>' +
          renderTimingJump(sections) +
          '<div class="timings">' + body + '</div>' +
        '</section>';
      }

      function renderJudges(data) {
        var items = data.judges || [];
        var rows = items.length ? items.map(function (judge, index) {

          '</button>';
        }).join('') : '<div class="card"><h3>Судьи скоро появятся</h3><p>Список судей обновится ближе к чемпионату.</p></div>';
        return '<section class="section" data-section="judges">' +
          '<div class="section__head"><h2>Судьи</h2><p>Работы участников оценивают практики кофейной индустрии.</p></div>' +
          '<div class="judges">' + rows + '</div>' +
        '</section>';

      function renderPrizes(content) {
        var prizes = content.prizes || [];
        if (!prizes.length) {
          return '<section class="section" data-section="prizes">' +
            '<div class="section__head"><h2>Призы</h2><p>Призовые наборы объявим ближе к чемпионату.</p></div>' +
            '<div class="card"><h3>Список обновится</h3><p>Партнёры уже подключаются к проекту. Как только призы будут подтверждены, они появятся здесь.</p></div>' +
          '</section>';
        }
        return '<section class="section" data-section="prizes">' +
          '<div class="section__head"><h2>Призы</h2><p>Победители получат подарки от партнёров чемпионата.</p></div>' +
          '<div class="prizes">' + prizes.map(function (prize) {
            return '<article class="prize">' +
              '<div class="prize__head"><h3>' + esc(prize.place) + '</h3>' + (prize.badge ? '<span class="label">' + esc(prize.badge) + '</span>' : '') + '</div>' +
              '<div class="prize__body">' + (prize.groups || []).map(function (group) {
                return '<div class="prize__group"><h3>' + esc(group.title) + '</h3>' + list(group.items || []) + '</div>';
              }).join('') + (prize.note ? '<p>' + esc(prize.note) + '</p>' : '') + '</div>' +
            '</article>';
          }).join('') + '</div>' +
        '</section>';
      }

      function renderFaq(content) {
        var experienceFaq = {
          q: 'Кто может участвовать в чемпионате?',
          a: 'Участвовать может бариста от 18 лет. Ограничения по опыту работы нет.'
        };
        var faqItems = (content.faq || []).filter(function (item) {
          return String(item.q || '').trim().toLowerCase() !== 'кто может участвовать?';
        });
        var items = [experienceFaq].concat(faqItems);
        return '<section class="section" data-section="faq">' +
          '<div class="section__head"><h2>FAQ</h2><p>Короткие ответы по участию в чемпионате.</p></div>' +
          '<div class="faq">' + items.map(function (item) {
            var links = [];
            if (MAP_URL && /где проходит/i.test(String(item.q || ''))) {
              links.push('<a class="faq__link" href="' + esc(MAP_URL) + '" target="_blank" rel="noopener">Открыть карту</a>');
            }
            if (item.link_url) {
              if (/\.(?:png|jpe?g|webp|gif)(?:\?|$)/i.test(String(item.link_url))) {
                links.push('<img class="faq__image" src="' + esc(item.link_url) + '" alt="' + esc(item.link_label || item.q || 'Изображение') + '" loading="lazy">');
              } else {
                links.push('<a class="faq__link" href="' + esc(item.link_url) + '" target="_blank" rel="noopener">' + esc(item.link_label || 'Открыть ссылку') + '</a>');
              }
            }
            return '<details><summary>' + esc(item.q) + '</summary><p>' + textWithBreaks(item.a) + '</p>' + links.join('') + '</details>';
          }).join('') + '</div>' +
        '</section>';
      }

      function openJudgeModal(index) {
        var data = state.payload && state.payload.data ? state.payload.data : {};
        var judge = (data.judges || [])[Number(index)];
        if (!judge) return;
        var role = judge.role || judge.short_description || '';
        var description = judge.description || judge.short_description || judge.role || 'Подробная информация о судье появится ближе к чемпионату.';
        judgeModal.innerHTML = '<div class="modal__panel" role="dialog" aria-modal="true" aria-label="' + esc(judge.name || 'Судья чемпионата') + '">' +
          '<div class="modal__head">' +
            '<img src="' + esc(judge.photo_url || '') + '" alt="">' +
            '<div><h2>' + esc(judge.name || 'Судья чемпионата') + '</h2>' + (role ? '<p>' + esc(role) + '</p>' : '') + '</div>' +
            '<button class="modal__close" type="button" data-modal-close aria-label="Закрыть">×</button>' +
          '</div>' +

      function closeJudgeModal() {
        judgeModal.hidden = true;
        judgeModal.innerHTML = '';

      function render(payload, options) {
        options = options || {};
        var scrollTop = window.scrollY || document.documentElement.scrollTop || 0;
        state.payload = payload;
        var data = payload.data || {};
        var content = payload.content || {};
        app.innerHTML = renderHome(data, content) + renderRules(content) + renderParticipants(data) + renderJudges(data) + renderPrizes(content) + renderFaq(content);
        nav.hidden = false;
        setActiveTab(state.activeTab, { keepScroll: options.keepScroll });
        if (options.keepScroll) window.scrollTo({ top: scrollTop, behavior: 'auto' });
      }

      function setActiveTab(tab, options) {
        options = options || {};
        state.activeTab = tab;
        app.querySelectorAll('[data-section]').forEach(function (section) {
          section.classList.toggle('is-active', section.getAttribute('data-section') === tab);
        });
        nav.querySelectorAll('button').forEach(function (button) {
          button.classList.toggle('is-active', button.getAttribute('data-tab') === tab);
        });
        if (!options.keepScroll) window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      nav.addEventListener('click', function (event) {
        var button = event.target.closest('[data-tab]');
        if (button) setActiveTab(button.getAttribute('data-tab'));
      });

      app.addEventListener('click', function (event) {
        var tabLink = event.target.closest('[data-tab-link]');
        if (tabLink) {
          event.preventDefault();
          setActiveTab(tabLink.getAttribute('data-tab-link'));
          return;
        }
        var jump = event.target.closest('[data-timing-jump]');
        if (jump) {
          var target = app.querySelector('[data-timing-section="' + jump.getAttribute('data-timing-jump') + '"]');
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          return;
        }
        var button = event.target.closest('[data-judge-index]');
        if (button) openJudgeModal(button.getAttribute('data-judge-index'));
      });

      judgeModal.addEventListener('click', function (event) {
        if (event.target === judgeModal || event.target.closest('[data-modal-close]')) closeJudgeModal();
      });

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && !judgeModal.hidden) closeJudgeModal();
      });

      if (tg) {
        syncTheme();
        tg.onEvent('themeChanged', syncTheme);
        tg.ready();
        tg.expand();
        tg.setHeaderColor('secondary_bg_color');
        tg.setBackgroundColor(getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#f5f5f5');
      }

      showLoading();

      function loadData(options) {
        options = options || {};
        return fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tg ? tg.initData : '' }),
          cache: 'no-store'
        }).then(function (response) {
          return response.json().then(function (payload) {
            if (!response.ok || !payload.ok) throw new Error(payload.error || 'Нет доступа');
            render(payload, options);
            return true;
          });
        }).catch(function (err) {
          if (!options.silent) showAccess(err.message);
          return false;
        });
      }

      function startAutoRefresh() {
        if (state.refreshTimer) return;
        state.refreshTimer = window.setInterval(function () {
          if (!document.hidden) loadData({ silent: true, keepScroll: true });
        }, REFRESH_INTERVAL_MS);
      }

      document.addEventListener('visibilitychange', function () {
        if (!document.hidden && state.payload) loadData({ silent: true, keepScroll: true });
      });

      loadData().then(function (ok) {
        if (ok) startAutoRefresh();
      });
    })();
  </script>
</body>
</html>
